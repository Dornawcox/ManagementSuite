    // AUTH CONTEXT
    // ============================================
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const savedUser = localStorage.getItem('pos_user');
        if (savedUser) setUser(JSON.parse(savedUser));
        setLoading(false);
      }, []);

      const login = async (username, pin) => {
        const foundUser = USERS.find(u => u.username === username && u.pin === pin && u.active);
        if (foundUser) {
          const userData = { ...foundUser, pin: undefined };
          setUser(userData);
          localStorage.setItem('pos_user', JSON.stringify(userData));
          return { success: true, user: userData };
        }
        return { success: false, error: 'Invalid credentials' };
      };

      const logout = () => {
        setUser(null);
        localStorage.removeItem('pos_user');
      };

      const hasPermission = (permission) => {
        if (!user) return false;
        if (user.permissions?.includes('all')) return true;
        return user.permissions?.includes(permission);
      };

      return (
        <AuthContext.Provider value={{ user, login, logout, hasPermission, loading }}>
          {children}
        </AuthContext.Provider>
      );
    };

    // ============================================

    const LoginScreen = () => {
      const { login } = useAuth();
      const [username, setUsername] = useState('');
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        const result = await login(username, pin);
        if (!result.success) setError(result.error);
        setLoading(false);
      };

      const quickLogin = async (u, p) => {
        setLoading(true);
        await login(u, p);
        setLoading(false);
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg, #1a4d3e 0%, #0f6e56 50%, #1a8a6d 100%)', padding: '20px' }}>

    // MAIN APP
    // ============================================
    function MainApp() {
      const { user, logout, hasPermission } = useAuth();
      const [view, setView] = useState(() => user?.role === 'kiosk' ? 'kiosk' : 'pos');
      const [products, setProducts] = useState(PRODUCTS);
      const [vendors, setVendors] = useState(VENDORS);
      const [devices, setDevices] = useState(DEVICES);
      const [users, setUsers] = useState(USERS);
      const [settings, setSettings] = useState(SETTINGS);
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('vegetables');
      const [scaleProduct, setScaleProduct] = useState(null);
      const [weight, setWeight] = useState(0);
      const [stable, setStable] = useState(true);
      const [language, setLanguage] = useState('en');
      const [vendorFilter, setVendorFilter] = useState('all');
      const [scannerInput, setScannerInput] = useState('');
      
      // Modal states
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingVendor, setEditingVendor] = useState(null);
      const [editingUser, setEditingUser] = useState(null);
      const [editingDevice, setEditingDevice] = useState(null);
      const [showPayment, setShowPayment] = useState(false);
      const [showSettlement, setShowSettlement] = useState(false);
      const [adminSection, setAdminSection] = useState('store');

      // Scale simulation
      const simulateWeigh = useCallback(() => {
        setStable(false);
        const targetWeight = (Math.random() * 3 + 0.5).toFixed(2);
        let current = 0;
        const interval = setInterval(() => {
          current += parseFloat(targetWeight) / 10;
          if (current >= parseFloat(targetWeight)) {
            setWeight(parseFloat(targetWeight));
            setStable(true);
            clearInterval(interval);
          } else {
            setWeight(parseFloat(current.toFixed(2)));
          }
        }, 100);
      }, []);

      const findProductByBarcode = (barcode) => {
        for (const category of Object.keys(products)) {
          const product = products[category].find(p => p.barcode === barcode);
          if (product) return { product, category };
        }
        return null;
      };

      const addToCart = (product, quantity, weightValue = null) => {
        const isWeight = product.unitType === 'weight';
        const actualQuantity = weightValue || quantity;
        const lineTotal = isWeight ? product.price * actualQuantity : product.price * quantity;
        const vendor = vendors[product.vendorId];
        
        if (!isWeight) {
          const existingIndex = cart.findIndex(item => item.id === product.id);
          if (existingIndex >= 0) {
            const newCart = [...cart];
            newCart[existingIndex].quantity += quantity;
            newCart[existingIndex].total = newCart[existingIndex].quantity * product.price;
            setCart(newCart);
            return;
          }
        }
        
        setCart([...cart, {
          ...product,
          cartId: `cart_${Date.now()}_${Math.random()}`,
          quantity: isWeight ? actualQuantity : quantity,
          total: lineTotal,
          isWeight,
          vendorName: vendor?.name || 'Unknown',
          vendorColor: vendor?.color || '#666',
          commissionRate: vendor?.commissionRate || 0,
        }]);
      };

      const updateCartItem = (cartId, updates) => {
        setCart(cart.map(item => {
          if (item.cartId === cartId) {
            const newItem = { ...item, ...updates };
            newItem.total = newItem.price * newItem.quantity;
            return newItem;
          }
          return item;
        }));
      };

      const removeCartItem = (cartId) => setCart(cart.filter(item => item.cartId !== cartId));

      const refreshData = () => {
        setProducts({ ...PRODUCTS });
        setVendors({ ...VENDORS });
        setDevices([...DEVICES]);
        setUsers([...USERS]);
        setSettings({ ...SETTINGS });
      };

      const cartTotal = cart.reduce((sum, item) => sum + item.total, 0);
      const cartByVendor = useMemo(() => {
        const grouped = {};
        cart.forEach(item => {
          if (!grouped[item.vendorId]) grouped[item.vendorId] = { vendor: vendors[item.vendorId], items: [], subtotal: 0 };
          grouped[item.vendorId].items.push(item);
          grouped[item.vendorId].subtotal += item.total;
        });
        return grouped;
      }, [cart, vendors]);

      const availableViews = useMemo(() => {
        const views = [];
        if (hasPermission('pos') || hasPermission('all')) views.push({ id: 'pos', label: '👤 POS' });
        if (hasPermission('kiosk') || hasPermission('all')) views.push({ id: 'kiosk', label: '🖥️ Kiosk' });
        if (hasPermission('vendors') || hasPermission('all')) views.push({ id: 'vendors', label: '🤝 Vendors' });
        if (hasPermission('inventory') || hasPermission('all')) views.push({ id: 'inventory', label: '📦 Inventory' });
        if (hasPermission('settings') || hasPermission('all')) views.push({ id: 'admin', label: '⚙️ Admin' });
        return views;
      }, [hasPermission]);

      // ============================================
      // USER EDIT MODAL
      // ============================================
      const UserEditModal = ({ userToEdit, onClose }) => {
        const [form, setForm] = useState(userToEdit || {
          username: '', name: '', email: '', pin: '', role: 'cashier', active: true
        });
        const [saving, setSaving] = useState(false);
        const [showPin, setShowPin] = useState(false);

        const handleSave = () => {
          setSaving(true);
          if (userToEdit?.id) {
            const idx = USERS.findIndex(u => u.id === userToEdit.id);
            if (idx >= 0) USERS[idx] = { ...USERS[idx], ...form };
          } else {
            const newUser = { ...form, id: `u${Date.now()}`, createdAt: new Date().toISOString().split('T')[0], permissions: ROLES.find(r => r.id === form.role)?.permissions || [] };
            USERS.push(newUser);
          }
          setUsers([...USERS]);
          setSaving(false);
          onClose();
        };

        const handleDelete = () => {
          if (confirm('Delete this user?')) {
            USERS = USERS.filter(u => u.id !== userToEdit.id);
            setUsers([...USERS]);
            onClose();
          }
        };

        return (
          <div style={styles.modal} onClick={onClose}>
            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{userToEdit?.id ? '✏️ Edit User' : '➕ New User'}</h2>
              
              <div style={{ display: 'grid', gap: '12px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Username *</label>
                    <input style={styles.input} value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} />
                  </div>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Full Name *</label>
                    <input style={styles.input} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                  </div>
                </div>

                <div>
                  <label style={{ fontSize: '11px', color: '#666' }}>Email</label>
                  <input style={styles.input} type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>PIN (4 digits) *</label>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <input style={{ ...styles.input, flex: 1 }} type={showPin ? 'text' : 'password'} maxLength={4} value={form.pin} onChange={e => setForm({ ...form, pin: e.target.value })} />
                      <button style={{ ...styles.button, ...styles.secondaryBtn, padding: '8px' }} onClick={() => setShowPin(!showPin)}>{showPin ? '🙈' : '👁️'}</button>
                    </div>
                  </div>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Role *</label>
                    <select style={styles.input} value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}>
                      {ROLES.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                    </select>
                  </div>
                </div>

                <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                  <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '6px' }}>Role Permissions</div>
                  <div style={{ fontSize: '11px', color: '#666' }}>{ROLES.find(r => r.id === form.role)?.description}</div>
                </div>

                <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}>
                  <input type="checkbox" checked={form.active} onChange={e => setForm({ ...form, active: e.target.checked })} />
                  Active (can login)
                </label>

                <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>
                  {userToEdit?.id && userToEdit.id !== user.id && (
                    <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>
                  )}
                  <button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button>
                  <button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={saving || !form.username || !form.name || !form.pin}>
                    {saving ? 'Saving...' : 'Save'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // DEVICE EDIT MODAL
      // ============================================
      const DeviceEditModal = ({ deviceToEdit, onClose }) => {
        const [form, setForm] = useState(deviceToEdit || {
          type: 'scanner', name: '', model: '', connection: 'usb', port: '', enabled: true, config: {}
        });
        const [testing, setTesting] = useState(false);
        const [testResult, setTestResult] = useState(null);

        const deviceTypes = [
          { id: 'scanner', name: 'Barcode Scanner', icon: '📷' },
          { id: 'printer', name: 'Receipt Printer', icon: '🖨️' },
          { id: 'scale', name: 'Scale', icon: '⚖️' },
          { id: 'cashDrawer', name: 'Cash Drawer', icon: '💵' },
          { id: 'cardReader', name: 'Card Reader', icon: '💳' },
          { id: 'labelPrinter', name: 'Label Printer', icon: '🏷️' },
          { id: 'customerDisplay', name: 'Customer Display', icon: '🖥️' },
        ];

        const connectionTypes = ['usb', 'serial', 'network', 'bluetooth', 'hdmi', 'printer'];

        const handleSave = () => {
          if (deviceToEdit?.id) {
            const idx = DEVICES.findIndex(d => d.id === deviceToEdit.id);
            if (idx >= 0) DEVICES[idx] = { ...DEVICES[idx], ...form };
          } else {
            DEVICES.push({ ...form, id: `dev${Date.now()}`, status: 'disconnected' });
          }
          setDevices([...DEVICES]);
          onClose();
        };

        const handleTest = async () => {
          setTesting(true);
          setTestResult(null);
          await new Promise(r => setTimeout(r, 1000));
          const success = Math.random() > 0.3;
          setTestResult(success ? 'success' : 'failed');
          setTesting(false);
        };

        const handleDelete = () => {
          if (confirm('Delete this device?')) {
            DEVICES = DEVICES.filter(d => d.id !== deviceToEdit.id);
            setDevices([...DEVICES]);
            onClose();
          }
        };

        return (
          <div style={styles.modal} onClick={onClose}>
            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{deviceToEdit?.id ? '✏️ Edit Device' : '➕ Add Device'}</h2>
              
              <div style={{ display: 'grid', gap: '12px' }}>
                <div>
                  <label style={{ fontSize: '11px', color: '#666' }}>Device Type</label>
                  <select style={styles.input} value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}>
                    {deviceTypes.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
                  </select>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Device Name</label>
                    <input style={styles.input} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g., Main Scanner" />
                  </div>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Model</label>
                    <input style={styles.input} value={form.model} onChange={e => setForm({ ...form, model: e.target.value })} placeholder="e.g., Zebra DS2208" />
                  </div>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Connection Type</label>
                    <select style={styles.input} value={form.connection} onChange={e => setForm({ ...form, connection: e.target.value })}>
                      {connectionTypes.map(c => <option key={c} value={c}>{c.toUpperCase()}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: '11px', color: '#666' }}>Port / Address</label>
                    <input style={styles.input} value={form.port} onChange={e => setForm({ ...form, port: e.target.value })} placeholder="/dev/ttyUSB0 or IP:Port" />
                  </div>
                </div>

                {form.type === 'scale' && (
                  <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                    <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '8px' }}>Scale Settings</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px' }}>
                      <div>
                        <label style={{ fontSize: '10px', color: '#666' }}>Unit</label>
                        <select style={{ ...styles.input, padding: '8px' }} value={form.config?.unit || 'lb'} onChange={e => setForm({ ...form, config: { ...form.config, unit: e.target.value } })}>
                          <option value="lb">Pounds (lb)</option>
                          <option value="kg">Kilograms (kg)</option>
                          <option value="oz">Ounces (oz)</option>
                        </select>
                      </div>
                      <div>
                        <label style={{ fontSize: '10px', color: '#666' }}>Precision</label>
                        <select style={{ ...styles.input, padding: '8px' }} value={form.config?.precision || 2} onChange={e => setForm({ ...form, config: { ...form.config, precision: parseInt(e.target.value) } })}>
                          <option value={1}>0.1</option>
                          <option value={2}>0.01</option>
                          <option value={3}>0.001</option>
                        </select>
                      </div>
                      <div>
                        <label style={{ fontSize: '10px', color: '#666' }}>Baud Rate</label>
                        <select style={{ ...styles.input, padding: '8px' }} value={form.config?.baudRate || 9600} onChange={e => setForm({ ...form, config: { ...form.config, baudRate: parseInt(e.target.value) } })}>
                          <option value={9600}>9600</option>
                          <option value={19200}>19200</option>
                          <option value={38400}>38400</option>
                        </select>
                      </div>
                    </div>
                  </div>
                )}

                {form.type === 'printer' && (
                  <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                    <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '8px' }}>Printer Settings</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                      <div>
                        <label style={{ fontSize: '10px', color: '#666' }}>Paper Width (mm)</label>
                        <select style={{ ...styles.input, padding: '8px' }} value={form.config?.paperWidth || 80} onChange={e => setForm({ ...form, config: { ...form.config, paperWidth: parseInt(e.target.value) } })}>
                          <option value={58}>58mm</option>
                          <option value={80}>80mm</option>
                        </select>
                      </div>
                      <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px', marginTop: '18px' }}>
                        <input type="checkbox" checked={form.config?.autoCut !== false} onChange={e => setForm({ ...form, config: { ...form.config, autoCut: e.target.checked } })} />
                        Auto-cut paper
                      </label>
                    </div>
                  </div>
                )}

                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}>
                    <input type="checkbox" checked={form.enabled} onChange={e => setForm({ ...form, enabled: e.target.checked })} />
                    Device Enabled
                  </label>
                  <button style={{ ...styles.button, ...styles.secondaryBtn }} onClick={handleTest} disabled={testing}>
                    {testing ? '⏳ Testing...' : '🔌 Test Connection'}
                  </button>
                </div>

                {testResult && (
                  <div style={{ padding: '10px', borderRadius: '8px', background: testResult === 'success' ? '#dcfce7' : '#fef2f2', color: testResult === 'success' ? '#166534' : '#b91c1c', fontSize: '12px' }}>
                    {testResult === 'success' ? '✓ Device connected successfully' : '✗ Connection failed - check settings'}
                  </div>
                )}

                <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>
                  {deviceToEdit?.id && <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>}
                  <button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button>
                  <button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={!form.name}>Save</button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // PRODUCT EDIT MODAL
      // ============================================
      const ProductEditModal = ({ product, onClose }) => {
        const [form, setForm] = useState(product || {
          name: '', price: '', category: 'vegetables', unitType: 'each', unit: 'each',
          stock: '', barcode: `00${Date.now().toString().slice(-5)}`, vendorId: 'farm-store',
          origin: '', minStock: 10, sku: '', image: ''
        });

        const handleSave = () => {
          const data = { ...form, price: parseFloat(form.price), stock: parseInt(form.stock) || 0 };
          if (product?.id) {
            for (const cat of Object.keys(PRODUCTS)) {
              const idx = PRODUCTS[cat].findIndex(p => p.id === product.id);
              if (idx >= 0) { PRODUCTS[cat][idx] = { ...PRODUCTS[cat][idx], ...data }; break; }
            }
          } else {
            const id = `${data.category[0]}${Date.now()}`;
            if (!PRODUCTS[data.category]) PRODUCTS[data.category] = [];
            PRODUCTS[data.category].push({ ...data, id, image: data.image || 'https://images.unsplash.com/photo-1518843875459-f738682238a6?w=300&h=300&fit=crop' });
          }
          setProducts({ ...PRODUCTS });
          onClose();
        };

        const handleDelete = () => {
          if (confirm('Delete this product?')) {
            for (const cat of Object.keys(PRODUCTS)) {
              PRODUCTS[cat] = PRODUCTS[cat].filter(p => p.id !== product.id);
            }
            setProducts({ ...PRODUCTS });
            onClose();
          }
        };

        const selectedUnitType = UNIT_TYPES.find(u => u.id === form.unitType);

        return (
          <div style={styles.modal} onClick={onClose}>
            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{product?.id ? '✏️ Edit Product' : '➕ New Product'}</h2>
              <div style={{ display: 'grid', gap: '12px' }}>
                <div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px' }}>
                  <label style={{ fontSize: '12px', fontWeight: '600', color: '#0f6e56' }}>Vendor</label>
                  <select style={{ ...styles.input, marginTop: '6px' }} value={form.vendorId} onChange={e => setForm({ ...form, vendorId: e.target.value })}>
                    {Object.values(vendors).map(v => <option key={v.id} value={v.id}>{v.name} ({v.commissionRate}%)</option>)}
                  </select>
                </div>
                <input style={styles.input} placeholder="Product name *" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' }}>
                  <div><label style={{ fontSize: '11px', color: '#666' }}>Category</label><select style={styles.input} value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>{CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}</select></div>
                  <div><label style={{ fontSize: '11px', color: '#666' }}>Price *</label><input style={styles.input} type="number" step="0.01" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} /></div>
                  <div><label style={{ fontSize: '11px', color: '#666' }}>Stock</label><input style={styles.input} type="number" value={form.stock} onChange={e => setForm({ ...form, stock: e.target.value })} /></div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <div><label style={{ fontSize: '11px', color: '#666' }}>Unit Type</label><select style={styles.input} value={form.unitType} onChange={e => { const ut = UNIT_TYPES.find(u => u.id === e.target.value); setForm({ ...form, unitType: e.target.value, unit: ut.units[0] }); }}>{UNIT_TYPES.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                  <div><label style={{ fontSize: '11px', color: '#666' }}>Unit</label><select style={styles.input} value={form.unit} onChange={e => setForm({ ...form, unit: e.target.value })}>{selectedUnitType?.units.map(u => <option key={u} value={u}>{u}</option>)}</select></div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                  <input style={styles.input} placeholder="SKU" value={form.sku} onChange={e => setForm({ ...form, sku: e.target.value })} />
                  <input style={styles.input} placeholder="Barcode" value={form.barcode} onChange={e => setForm({ ...form, barcode: e.target.value })} />
                </div>
                <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>
                  {product?.id && <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>}
                  <button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button>
                  <button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={!form.name || !form.price}>Save</button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // VENDOR EDIT MODAL
      // ============================================
      const VendorEditModal = ({ vendor, onClose }) => {
        const [form, setForm] = useState(vendor || {
          name: '', type: 'consignment', commissionRate: 15, contact: '', paymentMethod: 'check',
          paymentTerms: 'net-15', color: '#666666', active: true, address: '', phone: ''
        });

        const handleSave = () => {
          if (vendor?.id) {
            VENDORS[vendor.id] = { ...VENDORS[vendor.id], ...form };
          } else {
            const id = form.name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            VENDORS[id] = { ...form, id };
          }
          setVendors({ ...VENDORS });
          onClose();
        };

        return (
          <div style={styles.modal} onClick={onClose}>
            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{vendor?.id ? '✏️ Edit Vendor' : '➕ New Vendor'}</h2>
              <div style={{ display: 'grid', gap: '12px' }}>
                <input style={styles.input} placeholder="Vendor name *" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>

      // ============================================
      // PAYMENT MODAL
      // ============================================
      const PaymentModal = () => {
        const [processing, setProcessing] = useState(false);
        const completeSale = async (method) => {
          setProcessing(true);
          TRANSACTIONS.push({
            id: `txn_${Date.now()}`,
            date: new Date().toISOString(),
            items: cart.map(item => ({ productId: item.id, name: item.name, vendorId: item.vendorId, quantity: item.quantity, price: item.price, total: item.total, isWeight: item.isWeight })),
            paymentMethod: method,
            total: cartTotal,
            cashier: user.name,
          });
          for (const item of cart) {
            for (const cat of Object.keys(PRODUCTS)) {
              const idx = PRODUCTS[cat].findIndex(p => p.id === item.id);
              if (idx >= 0) { PRODUCTS[cat][idx].stock = Math.max(0, PRODUCTS[cat][idx].stock - (item.isWeight ? 1 : item.quantity)); break; }
            }
          }
          setProducts({ ...PRODUCTS });
          setCart([]);
          setProcessing(false);
          setShowPayment(false);
        };

        return (
          <div style={styles.modal} onClick={() => !processing && setShowPayment(false)}>
            <div style={{ ...styles.modalContent, maxWidth: '450px' }} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 16px', fontSize: '18px' }}>💳 Complete Sale</h2>
              <div style={{ marginBottom: '16px' }}>
                {Object.entries(cartByVendor).map(([vendorId, data]) => (
                  <div key={vendorId} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 10px', marginBottom: '4px', background: '#f8f7f4', borderRadius: '6px', borderLeft: `3px solid ${data.vendor?.color || '#666'}` }}>
                    <span style={{ fontSize: '12px' }}>{data.vendor?.name}</span>
                    <span style={{ fontWeight: '600', fontSize: '13px' }}>${data.subtotal.toFixed(2)}</span>
                  </div>

              </div>
              <div style={{ fontSize: '28px', fontWeight: '700', color: '#0f6e56', textAlign: 'center', marginBottom: '20px', padding: '16px', background: '#f0fdf4', borderRadius: '10px' }}>${cartTotal.toFixed(2)}</div>

                <button style={{ ...styles.button, ...styles.primaryBtn, padding: '14px' }} onClick={() => completeSale('card')} disabled={processing}>{processing ? 'Processing...' : '💳 Card'}</button>
                <button style={{ ...styles.button, ...styles.secondaryBtn, padding: '14px' }} onClick={() => completeSale('cash')} disabled={processing}>💵 Cash</button>
              </div>
              <button style={{ ...styles.button, ...styles.dangerBtn, width: '100%' }} onClick={() => setShowPayment(false)} disabled={processing}>Cancel</button>
            </div>
          </div>
        );
      };

      // ============================================
      // SCALE PANEL
      // ============================================
      const ScalePanel = ({ product, onAdd, onCancel }) => (

              <div style={{ fontWeight: '600', color: '#92400e', fontSize: '14px' }}>{product.name}</div>
              <div style={{ fontSize: '12px', color: '#b45309' }}>${product.price.toFixed(2)}/lb</div>
            </div>
          </div>
          <div style={{ fontSize: '36px', fontWeight: '700', textAlign: 'center', color: '#78350f', fontFamily: 'monospace' }}>{weight.toFixed(2)} lb</div>

        </div>

            <div style={{ display: 'flex', gap: '5px', marginBottom: '12px', flexWrap: 'wrap' }}>
              {CATEGORIES.map(cat => (
                <button key={cat.id} style={{ padding: '6px 12px', borderRadius: '14px', border: '2px solid ' + cat.color, background: selectedCategory === cat.id ? cat.color : 'white', color: selectedCategory === cat.id ? 'white' : cat.color, fontSize: '11px', fontWeight: '600', cursor: 'pointer', fontFamily: 'inherit' }} onClick={() => setSelectedCategory(cat.id)}>{cat.icon} {cat.name}</button>

                return (
                  <div key={product.id} style={{ background: '#fafaf8', border: `1px solid ${product.stock < product.minStock ? '#fecaca' : '#e8e5dc'}`, borderRadius: '10px', padding: '10px', cursor: 'pointer', textAlign: 'center', position: 'relative' }} onClick={() => { if (product.unitType === 'weight') { setScaleProduct(product); simulateWeigh(); } else { addToCart(product, 1); } }}>
                    <span style={{ ...styles.vendorBadge, position: 'absolute', top: '6px', left: '6px', background: vendor?.color }}>{vendor?.name?.split(' ')[0]}</span>
                    <img src={product.image} alt="" style={{ width: '100%', height: '80px', objectFit: 'cover', borderRadius: '6px', marginBottom: '6px' }} />

                    <div style={{ fontSize: '9px', color: product.stock < product.minStock ? '#dc2626' : '#666', marginTop: '2px' }}>{product.unitType === 'weight' ? '⚖️ ' : ''}Stock: {product.stock}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {scaleProduct && <ScalePanel product={scaleProduct} onAdd={addToCart} onCancel={() => { setScaleProduct(null); setWeight(0); }} />}
            <CartPanel />
          </div>
        </div>
      );

      // KIOSK VIEW
      // ============================================

              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: '12px' }}>

              </div>
            </div>
            <div style={{ ...styles.card, overflowX: 'auto' }}>

                <tbody>
                  {filtered.map(product => {
                    const vendor = vendors[product.vendorId];
                    return (
                      <tr key={product.id} style={{ borderBottom: '1px solid #eee' }}>

                        <td style={{ padding: '10px' }}><span style={{ ...styles.vendorBadge, background: vendor?.color }}>{vendor?.name}</span></td>
                        <td style={{ padding: '10px', textAlign: 'right', fontWeight: '600' }}>${product.price.toFixed(2)}/{product.unit}</td>
                        <td style={{ padding: '10px', textAlign: 'right', fontWeight: '600', color: product.stock < product.minStock ? '#dc2626' : '#0f6e56' }}>{product.stock}{product.stock < product.minStock && ' ⚠️'}</td>
                        <td style={{ padding: '10px', textAlign: 'center' }}><button style={{ ...styles.button, ...styles.secondaryBtn, padding: '4px 10px', fontSize: '10px' }} onClick={() => setEditingProduct(product)}>Edit</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // ============================================
      // ADMIN VIEW (FULLY EDITABLE)
      // ============================================
      const renderAdmin = () => {
        const [localSettings, setLocalSettings] = useState(settings);
        const [saving, setSaving] = useState(false);
        const [testingDb, setTestingDb] = useState(false);
        const [testingFarmos, setTestingFarmos] = useState(false);

        const saveSettings = () => {
          setSaving(true);
          Object.assign(SETTINGS, localSettings);
          setSettings({ ...SETTINGS });
          setTimeout(() => setSaving(false), 500);
        };

        const testDbConnection = async () => {
          setTestingDb(true);
          await new Promise(r => setTimeout(r, 1500));
          setLocalSettings({ ...localSettings, dbConnected: true, dbLastSync: new Date().toISOString() });
          setTestingDb(false);
        };

        const testFarmosConnection = async () => {
          setTestingFarmos(true);
          await new Promise(r => setTimeout(r, 1500));
          setLocalSettings({ ...localSettings, farmosStatus: localSettings.farmosUrl ? 'connected' : 'disconnected', farmosLastSync: new Date().toISOString() });
          setTestingFarmos(false);
        };

          { id: 'store', label: '🏪 Store', icon: '🏪' },
          { id: 'users', label: '👥 Users', icon: '👥' },
          { id: 'devices', label: '🔌 Devices', icon: '🔌' },
          { id: 'database', label: '🗄️ Database', icon: '🗄️' },
          { id: 'farmos', label: '🌱 farmOS', icon: '🌱' },

            {/* Section Tabs */}
            <div style={{ display: 'flex', gap: '6px', marginBottom: '16px', flexWrap: 'wrap' }}>
              {adminSections.map(sec => (
                <button key={sec.id} style={{ ...styles.button, ...(adminSection === sec.id ? styles.primaryBtn : styles.secondaryBtn), fontSize: '11px' }} onClick={() => setAdminSection(sec.id)}>{sec.label}</button>

            </div>

            {/* STORE SETTINGS */}
            {adminSection === 'store' && (

                <h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🏪 Store Information</h3>
                <div style={{ display: 'grid', gap: '12px' }}>
                  <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Store Name</label><input style={styles.input} value={localSettings.storeName} onChange={e => setLocalSettings({ ...localSettings, storeName: e.target.value })} /></div>
                  <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Address</label><input style={styles.input} value={localSettings.storeAddress} onChange={e => setLocalSettings({ ...localSettings, storeAddress: e.target.value })} /></div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                    <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Phone</label><input style={styles.input} value={localSettings.storePhone} onChange={e => setLocalSettings({ ...localSettings, storePhone: e.target.value })} /></div>
                    <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Email</label><input style={styles.input} value={localSettings.storeEmail} onChange={e => setLocalSettings({ ...localSettings, storeEmail: e.target.value })} /></div>
                  </div>
                  <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Website</label><input style={styles.input} value={localSettings.storeWebsite} onChange={e => setLocalSettings({ ...localSettings, storeWebsite: e.target.value })} /></div>
                  
                  <div style={{ borderTop: '1px solid #eee', paddingTop: '12px', marginTop: '4px' }}>
                    <h4 style={{ margin: '0 0 10px', fontSize: '13px' }}>Receipt Settings</h4>
                    <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Receipt Header</label><input style={styles.input} value={localSettings.receiptHeader} onChange={e => setLocalSettings({ ...localSettings, receiptHeader: e.target.value })} /></div>
                    <div style={{ marginTop: '10px' }}><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Receipt Footer</label><input style={styles.input} value={localSettings.receiptFooter} onChange={e => setLocalSettings({ ...localSettings, receiptFooter: e.target.value })} /></div>
                  </div>

                  <div style={{ borderTop: '1px solid #eee', paddingTop: '12px', marginTop: '4px' }}>
                    <h4 style={{ margin: '0 0 10px', fontSize: '13px' }}>Kiosk Settings</h4>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '16px' }}>
                      <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.kioskEnabled} onChange={e => setLocalSettings({ ...localSettings, kioskEnabled: e.target.checked })} /> Kiosk Mode Enabled</label>

                    </div>
                  </div>

                  <button style={{ ...styles.button, ...styles.primaryBtn, marginTop: '8px' }} onClick={saveSettings} disabled={saving}>{saving ? 'Saving...' : '💾 Save Store Settings'}</button>
                </div>
              </div>
            )}

            {/* USER MANAGEMENT */}
            {adminSection === 'users' && (
              <div style={styles.card}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>

                  <button style={{ ...styles.button, ...styles.primaryBtn }} onClick={() => setEditingUser({})}>➕ Add User</button>
                </div>
                <div style={{ display: 'grid', gap: '8px' }}>
                  {users.map(u => (
                    <div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: '#f8f7f4', borderRadius: '8px', cursor: 'pointer' }} onClick={() => setEditingUser(u)}>
                      <div>
                        <div style={{ fontWeight: '600', fontSize: '13px' }}>{u.name}</div>
                        <div style={{ fontSize: '11px', color: '#666' }}>@{u.username} • {u.email || 'No email'}</div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ padding: '3px 10px', borderRadius: '10px', fontSize: '10px', fontWeight: '600', background: u.role === 'admin' ? '#fef3c7' : u.role === 'manager' ? '#e0e7ff' : '#f0fdf4', color: u.role === 'admin' ? '#92400e' : u.role === 'manager' ? '#4338ca' : '#166534' }}>{u.role}</span>
                        {!u.active && <span style={{ padding: '3px 8px', borderRadius: '10px', fontSize: '9px', background: '#fef2f2', color: '#b91c1c' }}>Inactive</span>}
                      </div>

                </div>
                <div style={{ marginTop: '16px', padding: '12px', background: '#f0f9ff', borderRadius: '8px', fontSize: '11px', color: '#0369a1' }}>
                  <strong>Roles:</strong> Admin (full access), Manager (POS + inventory + vendors + settings), Cashier (POS only), Kiosk (self-service mode)
                </div>
              </div>
            )}

            {/* DEVICE CONFIGURATION */}
            {adminSection === 'devices' && (

                  <button style={{ ...styles.button, ...styles.primaryBtn }} onClick={() => setEditingDevice({})}>➕ Add Device</button>
                </div>
                <div style={{ display: 'grid', gap: '8px' }}>

                    const icons = { scanner: '📷', printer: '🖨️', scale: '⚖️', cashDrawer: '💵', cardReader: '💳', labelPrinter: '🏷️', customerDisplay: '🖥️' };
                    return (
                      <div key={device.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', borderRadius: '10px', border: `2px solid ${device.status === 'connected' ? '#22c55e' : '#f59e0b'}`, background: device.enabled ? 'white' : '#f9fafb', opacity: device.enabled ? 1 : 0.7, cursor: 'pointer' }} onClick={() => setEditingDevice(device)}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <span style={{ fontSize: '24px' }}>{icons[device.type]}</span>
                          <div>
                            <div style={{ fontWeight: '600', fontSize: '13px' }}>{device.name}</div>
                            <div style={{ fontSize: '10px', color: '#666' }}>{device.model} • {device.connection.toUpperCase()}</div>
                          </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                          <span style={{ padding: '3px 8px', borderRadius: '10px', fontSize: '10px', fontWeight: '600', background: device.status === 'connected' ? '#dcfce7' : '#fef3c7', color: device.status === 'connected' ? '#166534' : '#92400e' }}>{device.status}</span>
                          <span style={{ fontSize: '11px', color: device.enabled ? '#0f6e56' : '#888' }}>{device.enabled ? '● Enabled' : '○ Disabled'}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* DATABASE SETTINGS */}
            {adminSection === 'database' && (
              <div style={styles.card}>
                <h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🗄️ Database Configuration</h3>
                <div style={{ display: 'grid', gap: '12px' }}>
                  <div style={{ padding: '12px', borderRadius: '8px', background: localSettings.dbConnected ? '#dcfce7' : '#fef2f2', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div style={{ fontWeight: '600', color: localSettings.dbConnected ? '#166534' : '#b91c1c' }}>{localSettings.dbConnected ? '✓ Connected' : '✗ Disconnected'}</div>
                      {localSettings.dbLastSync && <div style={{ fontSize: '10px', color: '#666' }}>Last sync: {new Date(localSettings.dbLastSync).toLocaleString()}</div>}
                    </div>
                    <button style={{ ...styles.button, ...(localSettings.dbConnected ? styles.secondaryBtn : styles.primaryBtn) }} onClick={testDbConnection} disabled={testingDb}>{testingDb ? 'Testing...' : 'Test Connection'}</button>
                  </div>

                  <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Database Type</label>
                    <select style={styles.input} value={localSettings.dbType} onChange={e => setLocalSettings({ ...localSettings, dbType: e.target.value })}>
                      <option value="postgresql">PostgreSQL</option>
                      <option value="sqlite">SQLite (Local)</option>
                      <option value="odoo">Odoo Backend</option>
                    </select>
                  </div>

                  {localSettings.dbType !== 'sqlite' && (
                    <>
                      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '10px' }}>
                        <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Host</label><input style={styles.input} value={localSettings.dbHost} onChange={e => setLocalSettings({ ...localSettings, dbHost: e.target.value })} placeholder="localhost" /></div>
                        <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Port</label><input style={styles.input} type="number" value={localSettings.dbPort} onChange={e => setLocalSettings({ ...localSettings, dbPort: parseInt(e.target.value) })} /></div>
                      </div>
                      <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Database Name</label><input style={styles.input} value={localSettings.dbName} onChange={e => setLocalSettings({ ...localSettings, dbName: e.target.value })} /></div>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                        <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Username</label><input style={styles.input} value={localSettings.dbUser} onChange={e => setLocalSettings({ ...localSettings, dbUser: e.target.value })} /></div>
                        <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Password</label><input style={styles.input} type="password" value={localSettings.dbPassword} onChange={e => setLocalSettings({ ...localSettings, dbPassword: e.target.value })} /></div>
                      </div>
                      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                        <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.dbSsl} onChange={e => setLocalSettings({ ...localSettings, dbSsl: e.target.checked })} /> Use SSL</label>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}><label style={{ fontSize: '12px' }}>Pool Size:</label><input style={{ ...styles.input, width: '60px' }} type="number" value={localSettings.dbPoolSize} onChange={e => setLocalSettings({ ...localSettings, dbPoolSize: parseInt(e.target.value) })} /></div>
                      </div>
                    </>
                  )}

                  <div style={{ background: '#f0f9ff', padding: '12px', borderRadius: '8px', fontSize: '11px', color: '#0369a1' }}>
                    <strong>💡 Raspberry Pi 5 Setup:</strong> PostgreSQL is pre-installed. Default: localhost:5432, database: farm_pos, user: pos_user
                  </div>

                  <button style={{ ...styles.button, ...styles.primaryBtn }} onClick={saveSettings} disabled={saving}>{saving ? 'Saving...' : '💾 Save Database Settings'}</button>
                </div>
              </div>
            )}

            {/* FARMOS INTEGRATION */}
            {adminSection === 'farmos' && (
              <div style={styles.card}>
                <h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🌱 farmOS Integration</h3>
                <div style={{ display: 'grid', gap: '12px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: '#f8f7f4', borderRadius: '8px' }}>
                    <div>
                      <span style={{ fontWeight: '600' }}>Enable farmOS Sync</span>
                      <div style={{ fontSize: '11px', color: '#666' }}>Sync harvests, sales, and inventory with farmOS</div>
                    </div>
                    <button style={{ ...styles.toggle, background: localSettings.farmosEnabled ? '#0f6e56' : '#ccc' }} onClick={() => setLocalSettings({ ...localSettings, farmosEnabled: !localSettings.farmosEnabled })}>
                      <div style={{ ...styles.toggleKnob, left: localSettings.farmosEnabled ? '23px' : '3px' }} />
                    </button>
                  </div>

                  {localSettings.farmosEnabled && (
                    <>
                      <div style={{ padding: '12px', borderRadius: '8px', background: localSettings.farmosStatus === 'connected' ? '#dcfce7' : '#fef3c7', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <div style={{ fontWeight: '600', color: localSettings.farmosStatus === 'connected' ? '#166534' : '#92400e' }}>{localSettings.farmosStatus === 'connected' ? '✓ Connected to farmOS' : '○ Not connected'}</div>
                          {localSettings.farmosLastSync && <div style={{ fontSize: '10px', color: '#666' }}>Last sync: {new Date(localSettings.farmosLastSync).toLocaleString()}</div>}
                        </div>
                        <button style={{ ...styles.button, ...styles.secondaryBtn }} onClick={testFarmosConnection} disabled={testingFarmos}>{testingFarmos ? 'Testing...' : 'Test Connection'}</button>
                      </div>

                      <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>farmOS Server URL</label><input style={styles.input} value={localSettings.farmosUrl} onChange={e => setLocalSettings({ ...localSettings, farmosUrl: e.target.value })} placeholder="https://your-farm.farmos.net" /></div>
                      
                      <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                        <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '10px' }}>OAuth 2.0 Credentials</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                          <div><label style={{ fontSize: '10px', color: '#666' }}>Client ID</label><input style={{ ...styles.input, padding: '8px' }} value={localSettings.farmosClientId} onChange={e => setLocalSettings({ ...localSettings, farmosClientId: e.target.value })} /></div>
                          <div><label style={{ fontSize: '10px', color: '#666' }}>Client Secret</label><input style={{ ...styles.input, padding: '8px' }} type="password" value={localSettings.farmosClientSecret} onChange={e => setLocalSettings({ ...localSettings, farmosClientSecret: e.target.value })} /></div>
                        </div>
                      </div>

                      <div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>API Key (alternative auth)</label><input style={styles.input} type="password" value={localSettings.farmosApiKey} onChange={e => setLocalSettings({ ...localSettings, farmosApiKey: e.target.value })} placeholder="farmOS API key" /></div>

                      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <label style={{ fontSize: '12px' }}>Sync Interval:</label>
                        <select style={{ ...styles.input, width: '150px' }} value={localSettings.farmosSyncInterval} onChange={e => setLocalSettings({ ...localSettings, farmosSyncInterval: parseInt(e.target.value) })}>
                          <option value={5}>Every 5 minutes</option>
                          <option value={15}>Every 15 minutes</option>
                          <option value={30}>Every 30 minutes</option>
                          <option value={60}>Every hour</option>
                        </select>
                      </div>

                      <div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px' }}>
                        <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '8px', color: '#0f6e56' }}>Sync Options</div>
                        <div style={{ display: 'grid', gap: '6px' }}>
                          <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncHarvests} onChange={e => setLocalSettings({ ...localSettings, farmosSyncHarvests: e.target.checked })} /> Sync harvest logs → Inventory receipts</label>
                          <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncSales} onChange={e => setLocalSettings({ ...localSettings, farmosSyncSales: e.target.checked })} /> Sync sales → farmOS observations</label>
                          <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncInventory} onChange={e => setLocalSettings({ ...localSettings, farmosSyncInventory: e.target.checked })} /> Import farmOS assets as products</label>
                        </div>
                      </div>
                    </>

                  </div>

                  <button style={{ ...styles.button, ...styles.primaryBtn }} onClick={saveSettings} disabled={saving}>{saving ? 'Saving...' : '💾 Save farmOS Settings'}</button>
                </div>
              </div>

          </div>
        );
      };

      // SETTLEMENT MODAL
      // ============================================
      const SettlementModal = () => (
        <div style={styles.modal} onClick={() => setShowSettlement(false)}>
          <div style={{ ...styles.modalContent, maxWidth: '700px' }} onClick={e => e.stopPropagation()}>

            <div style={{ display: 'grid', gap: '10px' }}>
              {Object.values(vendors).filter(v => v.type === 'consignment').map(vendor => (
                <div key={vendor.id} style={{ padding: '14px', borderRadius: '10px', border: `2px solid ${vendor.color}` }}>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                      <span style={{ width: '10px', height: '10px', borderRadius: '50%', background: vendor.color }} />

                      <span style={{ fontSize: '10px', color: '#888' }}>{vendor.commissionRate}% commission</span>

                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px', marginTop: '10px', fontSize: '11px' }}>

                    <div><div style={{ color: '#888' }}>Net Payable</div><div style={{ fontWeight: '700', color: '#0f6e56' }}>$0.00</div></div>
                  </div>
                </div>
              ))}
            </div>
            <button style={{ ...styles.button, ...styles.secondaryBtn, width: '100%', marginTop: '16px' }} onClick={() => setShowSettlement(false)}>Close</button>

              <span style={{ fontSize: '22px' }}>🌱</span>
              <div>
                <div>{settings.storeName.split(' ').slice(0, 3).join(' ')}</div>
                <div style={{ fontSize: '9px', opacity: 0.8, fontWeight: '400' }}>{user.role.charAt(0).toUpperCase() + user.role.slice(1)}: {user.name}</div>
              </div>
            </div>
            <div style={styles.tabs}>
              {availableViews.map(tab => (
                <button key={tab.id} style={{ ...styles.tab, ...(view === tab.id ? styles.tabActive : styles.tabInactive) }} onClick={() => setView(tab.id)}>{tab.label}</button>
              ))}
            </div>
            <button style={{ ...styles.button, background: 'rgba(255,255,255,0.15)', color: 'white', fontSize: '11px' }} onClick={logout}>Logout</button>
          </header>

          {view === 'pos' && renderPOS()}
          {view === 'kiosk' && renderKiosk()}
          {view === 'vendors' && renderVendors()}
          {view === 'inventory' && renderInventory()}
          {view === 'admin' && renderAdmin()}

          {editingProduct !== null && <ProductEditModal product={editingProduct.id ? editingProduct : null} onClose={() => setEditingProduct(null)} />}
          {editingVendor !== null && <VendorEditModal vendor={editingVendor.id ? editingVendor : null} onClose={() => setEditingVendor(null)} />}
          {editingUser !== null && <UserEditModal userToEdit={editingUser.id ? editingUser : null} onClose={() => setEditingUser(null)} />}
          {editingDevice !== null && <DeviceEditModal deviceToEdit={editingDevice.id ? editingDevice : null} onClose={() => setEditingDevice(null)} />}
          {showPayment && <PaymentModal />}
          {showSettlement && <SettlementModal />}
        </div>
      );
    }

    // ============================================
    // APP ROOT
    // ============================================
    function App() {
      return <AuthProvider><AppContent /></AuthProvider>;
    }

    function AppContent() {
      const { user, loading } = useAuth();
      if (loading) return <div className="loading">Loading...</div>;
      return user ? <MainApp /> : <LoginScreen />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
