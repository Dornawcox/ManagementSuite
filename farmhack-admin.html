<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FarmHack Admin — Supabase Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:      #0d0d0d;
  --surface: #161616;
  --card:    #1e1e1e;
  --border:  #2a2a2a;
  --accent:  #f0c060;
  --green:   #4caf50;
  --red:     #ef5350;
  --blue:    #42a5f5;
  --text:    #e8e8e8;
  --muted:   #888;
  --radius:  10px;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Layout ── */
.page-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size: 20px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.badge { font-size: 10px; background: var(--card); border: 1px solid var(--border);
         border-radius: 4px; padding: 2px 8px; color: var(--muted); font-weight: 600;
         letter-spacing: .06em; text-transform: uppercase; }
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 57px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px;
            font-size: 13px; cursor: pointer; color: var(--muted); border-left: 3px solid transparent;
            transition: all .15s; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(240,192,96,.05); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.main { padding: 32px; max-width: 900px; }

/* ── Cards ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 24px; margin-bottom: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between;
               margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.card-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.section-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

/* ── Form controls ── */
label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .06em;
        color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
input, select, textarea {
  width: 100%; padding: 10px 14px; background: #111; border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 13px; outline: none;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
.field { margin-bottom: 16px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.hint { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
code { background: #111; border: 1px solid var(--border); border-radius: 4px;
       padding: 1px 6px; font-size: 11px; font-family: 'SF Mono',monospace; color: #aef; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
       border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer;
       border: none; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #111; }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-danger  { background: var(--red); color: #fff; }
.btn-green   { background: var(--green); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── Status indicators ── */
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-ok  { background: var(--green); }
.dot-err { background: var(--red); }
.dot-off { background: var(--muted); }
.dot-busy { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: .3; } }
.status-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 8px 0;
              border-bottom: 1px solid var(--border); }
.status-row:last-child { border-bottom: none; }
.status-label { color: var(--muted); flex: 1; }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .05em;
     color: var(--muted); text-transform: uppercase; padding: 8px 12px;
     border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,.02); }

/* ── Role badges ── */
.role-badge { display: inline-block; padding: 2px 9px; border-radius: 10px;
              font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.role-super_admin { background: #5b21b6; color: #fff; }
.role-admin    { background: #c45a10; color: #fff; }
.role-manager  { background: #1a6634; color: #fff; }
.role-member   { background: #1a4a8a; color: #fff; }
.role-guest    { background: #444; color: #aaa; }
.role-pending  { background: #333; color: #888; }

/* ── Alert boxes ── */
.alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
         display: flex; align-items: flex-start; gap: 10px; }
.alert-info    { background: rgba(66,165,245,.1); border: 1px solid rgba(66,165,245,.3); color: #90caf9; }
.alert-success { background: rgba(76,175,80,.1);  border: 1px solid rgba(76,175,80,.3);  color: #a5d6a7; }
.alert-warning { background: rgba(240,192,96,.1); border: 1px solid rgba(240,192,96,.3); color: var(--accent); }
.alert-danger  { background: rgba(239,83,80,.1);  border: 1px solid rgba(239,83,80,.3);  color: #ef9a9a; }

/* ── Log output ── */
.log-box { background: #0a0a0a; border: 1px solid var(--border); border-radius: 7px;
           padding: 12px 16px; font-family: 'SF Mono',monospace; font-size: 12px;
           max-height: 200px; overflow-y: auto; color: #888; }
.log-ok  { color: #6fcf97; }
.log-err { color: #eb5757; }
.log-info { color: #56ccf2; }

/* ── Tab nav ── */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab  { padding: 9px 18px; font-size: 13px; cursor: pointer; color: var(--muted);
        border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ── Schema view ── */
pre { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; font-size: 12px; overflow-x: auto; color: #aaa;
      font-family: 'SF Mono', monospace; white-space: pre; line-height: 1.6; }

/* ── Responsive ── */
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 20px; }
  .row, .row3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="page-header">
  <div class="logo">🌾 FarmHack Admin <span class="badge">v1</span></div>
  <div id="auth-status" style="font-size:12px;color:var(--muted)">⚪ Not connected</div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-item active" onclick="showPage('credentials')" id="nav-credentials">
      <span class="nav-icon">🔑</span> Credentials
    </div>
    <div class="nav-item" onclick="showPage('status')" id="nav-status">
      <span class="nav-icon">📡</span> Connection Status
    </div>
    <div class="nav-item" onclick="showPage('members')" id="nav-members">
      <span class="nav-icon">👥</span> Members & Roles
    </div>
    <div class="nav-item" onclick="showPage('documents')" id="nav-documents">
      <span class="nav-icon">📄</span> Signed Documents
    </div>
    <div class="nav-item" onclick="showPage('schema')" id="nav-schema">
      <span class="nav-icon">🗄️</span> Schema / SQL
    </div>
    <div class="nav-item" onclick="showPage('selfhost')" id="nav-selfhost">
      <span class="nav-icon">🖥️</span> Self-Hosted Setup
    </div>
    <div class="nav-item" onclick="showPage('media')" id="nav-media">
      <span class="nav-icon">🎥</span> Media Hosting
    </div>
    <div style="margin-top:20px;padding:0 20px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#333;margin-bottom:8px">Sites</div>
    </div>
    <div class="nav-item" onclick="openSite('tuckaway-coop-barn.html')">
      <span class="nav-icon">🐴</span> Barn / Coop
    </div>
    <div class="nav-item" onclick="openSite('wentworth-hunt-kennels.html')">
      <span class="nav-icon">🦊</span> WWH Kennels
    </div>
    <div class="nav-item" onclick="openSite('tuckaway-farm-hunters.html')">
      <span class="nav-icon">🦌</span> Hunters
    </div>
  </nav>

  <div class="main" id="main-content">
    <!-- pages rendered by JS -->
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// FarmHack Admin — single-file admin panel
// ══════════════════════════════════════════════════════════════════

var CRED_KEY = 'farmhack-supabase-v1';
var _sb = null;
var _currentPage = 'credentials';

function getCreds(){ try{ return JSON.parse(localStorage.getItem(CRED_KEY))||{}; }catch(_){ return {}; } }
function saveCreds(url,key){ localStorage.setItem(CRED_KEY, JSON.stringify({url:url.trim().replace(/\/$/,''), anonKey:key.trim()})); }

function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ── Connect to Supabase ───────────────────────────────────────────
function connect(){
  var creds = getCreds();
  if(!creds.url || !creds.anonKey){ updateAuthStatus(false, 'No credentials saved'); return; }
  _sb = supabase.createClient(creds.url, creds.anonKey);
  _sb.auth.getSession().then(function(r){
    var session = r.data && r.data.session;
    if(session){
      updateAuthStatus(true, session.user.email);
    } else {
      updateAuthStatus(false, 'Credentials loaded — sign in to test');
    }
  }).catch(function(e){ updateAuthStatus(false, e.message); });
}

function updateAuthStatus(ok, msg){
  var el = document.getElementById('auth-status');
  if(el) el.innerHTML = '<span class="status-dot '+(ok?'dot-ok':'dot-off')+'"></span> ' + esc(msg||'');
}

// ── Navigation ────────────────────────────────────────────────────
function showPage(name){
  _currentPage = name;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var nav = document.getElementById('nav-'+name);
  if(nav) nav.classList.add('active');
  var main = document.getElementById('main-content');
  var pages = { credentials: pageCreds, status: pageStatus, members: pageMembers,
                documents: pageDocs, schema: pageSchema, selfhost: pageSelfHost, media: pageMedia };
  if(pages[name]) main.innerHTML = pages[name]();
  else main.innerHTML = '<p style="color:var(--muted)">Page not found.</p>';
  initPage(name);
}

function openSite(f){ window.open(f,'_blank'); }

// ─────────────────────────────────────────────────────────────────
// PAGE: Credentials
// ─────────────────────────────────────────────────────────────────
function pageCreds(){
  var c = getCreds();
  return [
'<h2>🔑 Supabase Credentials</h2>',
'<p class="section-desc">These credentials are stored in your browser\'s localStorage and shared with all three farm sites. You only need to enter them once per device.</p>',

'<div class="alert alert-info">',
'<div>',
'<strong>Where to find your credentials:</strong><br>',
'Go to <strong>supabase.com</strong> → open your project → <strong>Settings → API</strong>. ',
'You need the <em>Project URL</em> and the <em>anon / public key</em> only. ',
'Never put your <em>service_role</em> key in any browser page.',
'</div>',
'</div>',

'<div class="card">',
'<div class="card-header"><div class="card-title">📡 Project Credentials</div></div>',

'<div class="field">',
'<label>Project URL</label>',
'<input id="sb-url" value="'+esc(c.url||'')+'" placeholder="https://abcdefghijklm.supabase.co">',
'<div class="hint">Found at <strong>Settings → API → Project URL</strong></div>',
'</div>',

'<div class="field">',
'<label>Anon / Public Key</label>',
'<input id="sb-key" type="password" value="'+esc(c.anonKey||'')+'" placeholder="eyJhbGci...">',
'<div class="hint">Settings → API → Project API Keys → <strong>anon public</strong> (safe for browser)</div>',
'</div>',

'<div class="field">',
'<label>Redirect URL <span style="font-weight:400;text-transform:none;color:#666;font-size:11px">(required when opening files directly via file://)</span></label>',
'<input id="sb-redirect" value="'+esc(c.redirectTo||'')+'" placeholder="http://localhost:8080/tuckaway-coop-barn.html">',
'<div class="hint">',
'Where Supabase sends users after clicking their magic link. ',
'If you open HTML files directly (file://) this <strong>must</strong> be set. ',
'If you serve files via <code>python3 -m http.server 8080</code> use <code>http://localhost:8080/filename.html</code>. ',
'Must also be added to Supabase → Authentication → URL Configuration → Redirect URLs.',
'</div>',
'</div>',

'<div style="display:flex;gap:10px;flex-wrap:wrap">',
'<button class="btn btn-primary" onclick="saveAndTest()">Save & Test Connection</button>',
'<button class="btn btn-secondary" onclick="clearCreds()">Clear Credentials</button>',
'</div>',
'<div id="creds-result" style="margin-top:16px"></div>',
'</div>',

'<div class="card">',
'<div class="card-header"><div class="card-title">🔐 What Each Key Does</div></div>',
'<div style="font-size:13px;line-height:1.7;color:var(--muted)">',
'<table>',
'<tr><th>Key</th><th>Safe in browser?</th><th>Use</th></tr>',
'<tr><td><code>Project URL</code></td><td style="color:var(--green)">✓ Yes</td><td>API endpoint — always public</td></tr>',
'<tr><td><code>anon public</code></td><td style="color:var(--green)">✓ Yes</td><td>User-facing reads/writes, gated by Row Level Security</td></tr>',
'<tr><td><code>service_role</code></td><td style="color:var(--red)">✗ Never</td><td>Admin operations — bypasses all RLS — server/CLI only</td></tr>',
'<tr><td><code>JWT Secret</code></td><td style="color:var(--red)">✗ Never</td><td>Token signing — server only</td></tr>',
'</table>',
'</div>',
'</div>',

'<div class="card" style="border-left:4px solid #ef5350">',
'<div class="card-header"><div class="card-title">🔗 Supabase Authentication URL Configuration</div></div>',
'<div style="font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:16px">',
'Supabase needs to know what URL to redirect to after the user clicks their magic link. ',
'By default it sends users to <code>localhost:3000</code> which does not exist.',
'</div>',
'<div style="display:flex;flex-direction:column;gap:12px">',
'<div style="background:#111;border-radius:8px;padding:14px">',
'<div style="font-size:11px;font-weight:700;letter-spacing:.06em;color:#666;margin-bottom:8px">STEP 1 — Set Site URL</div>',
'<div style="font-size:12px;color:#ccc;line-height:1.7">',
'Supabase dashboard → <strong style=\"color:#eee\">Authentication → URL Configuration</strong><br>',
'Change <strong>Site URL</strong> to where you serve your files:<br>',
'<code style=\"display:block;margin:5px 0;padding:6px 10px;background:#0a0a0a;border-radius:4px\">' +
'http://localhost:8080</code>',
'(or your production domain, e.g. <code>https://farm.yourdomain.com</code>)',
'</div>',
'</div>',
'<div style="background:#111;border-radius:8px;padding:14px">',
'<div style="font-size:11px;font-weight:700;letter-spacing:.06em;color:#666;margin-bottom:8px">STEP 2 — Add Redirect URLs</div>',
'<div style="font-size:12px;color:#ccc;line-height:1.7">',
'In the same screen, under <strong style=\"color:#eee\">Redirect URLs</strong>, add a wildcard for your server:<br>',
'<code style=\"display:block;margin:5px 0;padding:6px 10px;background:#0a0a0a;border-radius:4px\">' +
'http://localhost:8080/**</code>',
'This allows any of the three farm sites (barn, kennel, hunters) to receive the magic link callback.',
'</div>',
'</div>',
'<div style="background:#111;border-radius:8px;padding:14px">',
'<div style="font-size:11px;font-weight:700;letter-spacing:.06em;color:#666;margin-bottom:8px">STEP 3 — Serve your HTML files over HTTP</div>',
'<div style="font-size:12px;color:#ccc;line-height:1.7">',
'Open a terminal in the folder that contains your farm HTML files and run:<br>',
'<code style=\"display:block;margin:5px 0;padding:6px 10px;background:#0a0a0a;border-radius:4px\">' +
'python3 -m http.server 8080</code>',
'Then open the sites via <code>http://localhost:8080/tuckaway-coop-barn.html</code> etc.<br>',
'Leave the terminal running while using the sites. The server only runs on your local machine.',
'</div>',
'</div>',
'</div>',
'<div style="margin-top:14px;font-size:12px;color:var(--muted)">',
'If you open the files directly (file://) Supabase cannot redirect back to them. ',
'The HTTP server is the simplest fix — it is just Python, requires nothing installed.',
'</div>',
'</div>',

'<div class="card">',
'<div class="card-header"><div class="card-title">📋 Setup Checklist</div></div>',
'<div style="font-size:13px;line-height:2;color:var(--muted)">',
'<div>① Create a free Supabase project at <strong style="color:var(--text)">supabase.com</strong></div>',
'<div>② Go to SQL Editor → New query → paste the contents of <code>supabase-schema.sql</code> → Run</div>',
'<div>③ Go to Authentication → Email → enable "Magic Link" (disable "Email Confirm" for testing)</div>',
'<div>④ Go to Storage → enable the storage feature (buckets are created by the schema)</div>',
'<div>⑤ Paste your URL + anon key above and click Save & Test</div>',
'<div>⑥ Open any farm site — it will automatically use the same saved credentials</div>',
'</div>',
'</div>',
  ].join('');
}

function saveAndTest(){
  var url      = document.getElementById('sb-url').value.trim();
  var key      = document.getElementById('sb-key').value.trim();
  var redirect = document.getElementById('sb-redirect') ? document.getElementById('sb-redirect').value.trim() : '';
  if(!url||!key){ showResult('creds-result','Both URL and anon key are required.','err'); return; }
  // Save all three including optional redirectTo
  var creds = { url: url.replace(/\/$/,''), anonKey: key };
  if(redirect) creds.redirectTo = redirect;
  localStorage.setItem('farmhack-supabase-v1', JSON.stringify(creds));
  _sb = supabase.createClient(url,key);
  showResult('creds-result','Connecting…','info');
  _sb.from('site_config').select('*').limit(1)
    .then(function(r){
      if(r.error){
        showResult('creds-result','Connected but query failed: '+r.error.message+' — Did you run the schema SQL?','err');
        updateAuthStatus(false,'Creds OK, schema missing?');
      } else {
        showResult('creds-result','✓ Connected! Database tables accessible. ('+(r.data?r.data.length:0)+' site_config rows found)','ok');
        updateAuthStatus(true,'Connected — schema OK');
      }
    }).catch(function(e){ showResult('creds-result','Connection error: '+e.message,'err'); });
}

function clearCreds(){
  if(!confirm('Clear saved credentials from this browser?')) return;
  localStorage.removeItem(CRED_KEY);
  localStorage.removeItem('farmhack-profile-cache');
  showPage('credentials');
}

// ─────────────────────────────────────────────────────────────────
// PAGE: Connection Status
// ─────────────────────────────────────────────────────────────────
function pageStatus(){
  return [
'<h2>📡 Connection Status</h2>',
'<p class="section-desc">Live health check of your Supabase backend and all connected services.</p>',
'<div class="card">',
'<div class="card-header"><div class="card-title">Database Tables</div><button class="btn btn-secondary btn-sm" onclick="runStatusCheck()">Refresh</button></div>',
'<div id="status-rows">',
statusRow('site_config', 'pending'),
statusRow('profiles', 'pending'),
statusRow('documents', 'pending'),
statusRow('media', 'pending'),
statusRow('invitations', 'pending'),
statusRow('audit_log', 'pending'),
'</div>',
'</div>',
'<div class="card">',
'<div class="card-header"><div class="card-title">Storage Buckets</div></div>',
'<div id="bucket-rows">',
statusRow('farm-media', 'pending'),
statusRow('farm-docs', 'pending'),
statusRow('farm-public', 'pending'),
'</div>',
'</div>',
'<div class="card">',
'<div class="card-header"><div class="card-title">Auth Settings</div></div>',
'<div id="auth-rows">',
'<div class="status-row"><span class="status-label">Magic Link (OTP) auth</span>',
'<span id="status-auth-magic" class="dot-busy status-dot"></span>',
'<span id="status-auth-magic-txt" style="font-size:12px;color:var(--muted)">Checking…</span></div>',
'</div>',
'</div>',
  ].join('');
}

function statusRow(name, state){
  var dot = state==='ok'?'dot-ok':state==='err'?'dot-err':state==='pending'?'dot-busy':'dot-off';
  return '<div class="status-row" id="row-'+name+'"><span class="status-label">'+name+'</span>'+
         '<span class="status-dot '+dot+'" id="dot-'+name+'"></span>'+
         '<span id="txt-'+name+'" style="font-size:12px;color:var(--muted)">'+
         (state==='pending'?'Checking…':state)+'</span></div>';
}

function runStatusCheck(){
  if(!_sb){ showPage('status'); return; }
  ['site_config','profiles','documents','media','invitations','audit_log'].forEach(function(tbl){
    _sb.from(tbl).select('*',{count:'exact',head:true}).then(function(r){
      var dot = document.getElementById('dot-'+tbl);
      var txt = document.getElementById('txt-'+tbl);
      if(!dot) return;
      if(r.error){ dot.className='status-dot dot-err'; txt.textContent='Error: '+r.error.message; }
      else { dot.className='status-dot dot-ok'; txt.textContent='✓ '+r.count+' rows'; }
    });
  });
  // Buckets
  _sb.storage.listBuckets().then(function(r){
    var buckets = (r.data||[]).map(function(b){ return b.id||b.name; });
    ['farm-media','farm-docs','farm-public'].forEach(function(b){
      var dot = document.getElementById('dot-'+b);
      var txt = document.getElementById('txt-'+b);

      if(buckets.indexOf(b)>=0){ dot.className='status-dot dot-ok'; txt.textContent='✓ Exists'; }
      else { dot.className='status-dot dot-err'; txt.textContent='Missing — run schema SQL'; }
    });
  });
}

function loadMembers(){
  if(!_sb){ showResult('members-table','Not connected — save credentials first.','err'); return; }
  document.getElementById('members-table').innerHTML = '<div style="color:var(--muted);font-size:13px">Loading…</div>';
  _sb.from('profiles').select('*').order('created_at').then(function(r){
    if(r.error||!r.data.length){
      document.getElementById('members-table').innerHTML =
        r.error ? '<div style="color:var(--red)">'+esc(r.error.message)+'</div>'
                : '<div style="color:var(--muted);font-size:13px">No members yet. Users appear here after their first sign-in.</div>';
      return;
    }
    var rows = r.data.map(function(p){
      return '<tr>'+
        '<td><strong>'+esc(p.full_name||p.display_name||'—')+'</strong><br><span style="font-size:11px;color:var(--muted)">'+esc(p.email)+'</span></td>'+
        '<td><span class="role-badge role-'+esc(p.role)+'">'+esc(p.role)+'</span></td>'+
        '<td style="font-size:11px;color:var(--muted)">'+esc(p.member_type||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--muted)">'+esc(p.created_at?p.created_at.split('T')[0]:'')+'</td>'+
        '<td><select onchange="changeRole(\''+p.id+'\',this.value)" style="width:auto;padding:4px 8px;font-size:12px">'+
        ['pending','guest','member','manager','admin','super_admin'].map(function(r2){
          return '<option value="'+r2+'"'+(p.role===r2?' selected':'')+'>'+r2+'</option>';
        }).join('')+
        '</select></td>'+
        '</tr>';
    }).join('');
    document.getElementById('members-table').innerHTML =
      '<table><tr><th>Name / Email</th><th>Role</th><th>Type</th><th>Joined</th><th>Change Role</th></tr>'+rows+'</table>';
  });
}

function changeRole(userId, newRole){
  if(!_sb) return;
  _sb.from('profiles').update({ role: newRole }).eq('id', userId)
    .then(function(r){
      if(r.error) alert('Error: '+r.error.message);
      else { loadMembers(); }
    });
}

function showResult(elId, msg, type){
  var el = document.getElementById(elId);
  if(!el) return;
  var colors = {ok:'var(--green)', err:'var(--red)', info:'var(--accent)'};
  el.style.color = colors[type] || 'var(--text)';
  el.innerHTML = '<div class="alert alert-'+(type==='ok'?'success':type==='err'?'danger':'info')+'">'+esc(msg)+'</div>';
}

function initPage(name){
  if(name==='status') setTimeout(runStatusCheck, 100);
  if(name==='schema') {} // schema pre-filled
}

// ── Embedded schema SQL (subset — point to full file for production) ──────────
var SCHEMA_SQL = [
'-- Run this in Supabase SQL Editor → New Query',
'-- Full file: supabase-schema.sql (included in farmhack package)',
'',
'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";',
'',
'CREATE TYPE farm_role AS ENUM (\'super_admin\',\'admin\',\'manager\',\'member\',\'guest\',\'pending\');',
'CREATE TYPE farm_site AS ENUM (\'barn\',\'kennel\',\'hunters\',\'all\');',
'CREATE TYPE doc_type  AS ENUM (\'liability_release\',\'boarding_agreement\',\'hunter_release\',\'hunt_membership\',\'volunteer_agreement\');',
'CREATE TYPE media_kind AS ENUM (\'photo\',\'video\',\'audio\',\'document\',\'gpx\');',
'',
'CREATE TABLE IF NOT EXISTS profiles (',
'  id            UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,',
'  email         TEXT NOT NULL,',
'  full_name     TEXT, display_name TEXT,',
'  role          farm_role NOT NULL DEFAULT \'pending\',',
'  site_access   JSONB NOT NULL DEFAULT \'{}\'::jsonb,',
'  phone TEXT, address TEXT, emergency_name TEXT, emergency_phone TEXT,',
'  vehicle TEXT, trailer TEXT, farmos_uuid TEXT,',
'  is_active BOOLEAN NOT NULL DEFAULT true,',
'  created_at TIMESTAMPTZ NOT NULL DEFAULT now()',
');',
'',
'CREATE TABLE IF NOT EXISTS documents (',
'  id UUID DEFAULT uuid_generate_v4() PRIMARY KEY,',
'  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,',
'  site farm_site NOT NULL, doc_type doc_type NOT NULL, season TEXT,',
'  signed_at TIMESTAMPTZ NOT NULL DEFAULT now(),',
'  signature_data TEXT, acknowledgments JSONB, signer_name TEXT,',
'  is_valid BOOLEAN NOT NULL DEFAULT true,',
'  created_at TIMESTAMPTZ NOT NULL DEFAULT now()',
');',
'',
'CREATE TABLE IF NOT EXISTS media (',
'  id UUID DEFAULT uuid_generate_v4() PRIMARY KEY,',
'  uploaded_by UUID REFERENCES profiles(id),',
'  site farm_site NOT NULL, entity_type TEXT, entity_id TEXT,',
'  kind media_kind NOT NULL DEFAULT \'photo\',',
'  storage_path TEXT NOT NULL, storage_backend TEXT NOT NULL DEFAULT \'supabase\',',
'  filename TEXT, mime_type TEXT, size_bytes BIGINT,',
'  caption TEXT, is_public BOOLEAN NOT NULL DEFAULT false,',
'  created_at TIMESTAMPTZ NOT NULL DEFAULT now()',
');',
'',
'CREATE TABLE IF NOT EXISTS site_config (',
'  id UUID DEFAULT uuid_generate_v4() PRIMARY KEY,',
'  site farm_site NOT NULL, key TEXT NOT NULL, value JSONB,',
'  UNIQUE (site, key)',
');',
'',
'-- Enable Row Level Security',
'ALTER TABLE profiles  ENABLE ROW LEVEL SECURITY;',
'ALTER TABLE documents ENABLE ROW LEVEL SECURITY;',
'ALTER TABLE media      ENABLE ROW LEVEL SECURITY;',
'ALTER TABLE site_config ENABLE ROW LEVEL SECURITY;',
'',
'-- RLS policies',
'CREATE POLICY "profiles_select" ON profiles FOR SELECT USING (is_active OR id = auth.uid());',
'CREATE POLICY "profiles_insert" ON profiles FOR INSERT WITH CHECK (id = auth.uid());',
'CREATE POLICY "profiles_update_own" ON profiles FOR UPDATE USING (id = auth.uid());',
'CREATE POLICY "documents_select" ON documents FOR SELECT USING (',
'  user_id = auth.uid() OR',
'  (SELECT role FROM profiles WHERE id = auth.uid()) IN (\'admin\',\'super_admin\',\'manager\'));',
'CREATE POLICY "documents_insert" ON documents FOR INSERT WITH CHECK (user_id = auth.uid());',
'CREATE POLICY "media_select"    ON media FOR SELECT USING (auth.uid() IS NOT NULL);',
'CREATE POLICY "media_insert"    ON media FOR INSERT WITH CHECK (uploaded_by = auth.uid());',
'CREATE POLICY "config_select"   ON site_config FOR SELECT USING (true);',
'',
'-- Storage buckets',
'INSERT INTO storage.buckets (id,name,public,file_size_limit) VALUES',
'  (\'farm-media\',\'farm-media\',false,104857600),',
'  (\'farm-docs\',\'farm-docs\',false,20971520),',
'  (\'farm-public\',\'farm-public\',true,5242880)',
'ON CONFLICT (id) DO NOTHING;',
'',
'-- See supabase-schema.sql for complete schema with all policies, views, and seed data'
].join('\n');
