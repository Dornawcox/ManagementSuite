    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const savedUser = localStorage.getItem('pos_user');
        if (savedUser) setUser(JSON.parse(savedUser));
        setLoading(false);
      }, []);

      const login = async (username, pin) => {
        const foundUser = USERS.find(u => u.username === username && u.pin === pin && u.active);
        if (foundUser) {
          const userData = { ...foundUser, pin: undefined };
          setUser(userData);
          localStorage.setItem('pos_user', JSON.stringify(userData));
          return { success: true, user: userData };
        }
        return { success: false, error: 'Invalid credentials' };
      };

      const logout = () => { setUser(null); localStorage.removeItem('pos_user'); };
      const hasPermission = (permission) => { if (!user) return false; if (user.permissions?.includes('all')) return true; return user.permissions?.includes(permission); };

      return <AuthContext.Provider value={{ user, login, logout, hasPermission, loading }}>{children}</AuthContext.Provider>;

    // MAIN APP

      const { user, logout, hasPermission } = useAuth();
      const [view, setView] = useState(() => user?.role === 'kiosk' ? 'kiosk' : 'pos');
      const [products, setProducts] = useState(PRODUCTS);
      const [vendors, setVendors] = useState(VENDORS);
      const [devices, setDevices] = useState(DEVICES);
      const [users, setUsers] = useState(USERS);
      const [settings, setSettings] = useState(SETTINGS);
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('vegetables');
      const [scaleProduct, setScaleProduct] = useState(null);
      const [weight, setWeight] = useState(0);
      const [stable, setStable] = useState(true);
      const [language, setLanguage] = useState('en');
      const [vendorFilter, setVendorFilter] = useState('all');
      const [scannerInput, setScannerInput] = useState('');
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingVendor, setEditingVendor] = useState(null);
      const [editingUser, setEditingUser] = useState(null);
      const [editingDevice, setEditingDevice] = useState(null);
      const [showPayment, setShowPayment] = useState(false);
      const [showSettlement, setShowSettlement] = useState(false);
      const [adminSection, setAdminSection] = useState('store');
      const [showKioskCart, setShowKioskCart] = useState(false);
      
      // Admin settings state (moved to component level to fix hooks violation)
      const [localSettings, setLocalSettings] = useState({ ...SETTINGS });
      const [adminSaving, setAdminSaving] = useState(false);
      const [testingDb, setTestingDb] = useState(false);
      const [testingFarmos, setTestingFarmos] = useState(false);
      
      // Sync localSettings when settings change
      useEffect(() => { setLocalSettings({ ...settings }); }, [settings]);

      const simulateWeigh = useCallback(() => {
        setStable(false);
        const targetWeight = (Math.random() * 3 + 0.5).toFixed(2);
        let current = 0;
        const interval = setInterval(() => {
          current += parseFloat(targetWeight) / 10;
          if (current >= parseFloat(targetWeight)) { setWeight(parseFloat(targetWeight)); setStable(true); clearInterval(interval); }
          else { setWeight(parseFloat(current.toFixed(2))); }
        }, 100);
      }, []);

      const findProductByBarcode = (barcode) => { for (const category of Object.keys(products)) { const product = products[category].find(p => p.barcode === barcode); if (product) return { product, category }; } return null; };

      const addToCart = (product, quantity, weightValue = null) => {
        const isWeight = product.unitType === 'weight';
        const actualQuantity = weightValue || quantity;
        const lineTotal = isWeight ? product.price * actualQuantity : product.price * quantity;
        const vendor = vendors[product.vendorId];
        if (!isWeight) {
          const existingIndex = cart.findIndex(item => item.id === product.id);
          if (existingIndex >= 0) { const newCart = [...cart]; newCart[existingIndex].quantity += quantity; newCart[existingIndex].total = newCart[existingIndex].quantity * product.price; setCart(newCart); return; }
        }
        setCart([...cart, { ...product, cartId: `cart_${Date.now()}_${Math.random()}`, quantity: isWeight ? actualQuantity : quantity, total: lineTotal, isWeight, vendorName: vendor?.name || 'Unknown', vendorColor: vendor?.color || '#666', commissionRate: vendor?.commissionRate || 0 }]);
      };

      const updateCartItem = (cartId, updates) => { setCart(cart.map(item => { if (item.cartId === cartId) { const newItem = { ...item, ...updates }; newItem.total = newItem.price * newItem.quantity; return newItem; } return item; })); };
      const removeCartItem = (cartId) => setCart(cart.filter(item => item.cartId !== cartId));
      const cartTotal = cart.reduce((sum, item) => sum + item.total, 0);
      const cartByVendor = useMemo(() => { const grouped = {}; cart.forEach(item => { if (!grouped[item.vendorId]) grouped[item.vendorId] = { vendor: vendors[item.vendorId], items: [], subtotal: 0 }; grouped[item.vendorId].items.push(item); grouped[item.vendorId].subtotal += item.total; }); return grouped; }, [cart, vendors]);

      // FIXED: Views available based on permissions - kiosk available to POS users, admin available to settings users
      const availableViews = useMemo(() => {
        const views = [];
        if (hasPermission('pos') || hasPermission('all')) views.push({ id: 'pos', label: '👤 POS' });
        if (hasPermission('kiosk') || hasPermission('pos') || hasPermission('all')) views.push({ id: 'kiosk', label: '🖥️ Kiosk' });
        if (hasPermission('vendors') || hasPermission('all')) views.push({ id: 'vendors', label: '🤝 Vendors' });
        if (hasPermission('inventory') || hasPermission('all')) views.push({ id: 'inventory', label: '📦 Inventory' });
        if (hasPermission('settings') || hasPermission('all')) views.push({ id: 'admin', label: '⚙️ Admin' });
        return views;
      }, [hasPermission]);

      // USER EDIT MODAL
      const UserEditModal = ({ userToEdit, onClose }) => {
        const [form, setForm] = useState(userToEdit || { username: '', name: '', email: '', pin: '', role: 'cashier', active: true });
        const [saving, setSaving] = useState(false);
        const [showPin, setShowPin] = useState(false);
        const handleSave = () => { setSaving(true); const rolePerms = ROLES.find(r => r.id === form.role)?.permissions || []; if (userToEdit?.id) { const idx = USERS.findIndex(u => u.id === userToEdit.id); if (idx >= 0) USERS[idx] = { ...USERS[idx], ...form, permissions: rolePerms }; } else { USERS.push({ ...form, id: `u${Date.now()}`, createdAt: new Date().toISOString().split('T')[0], permissions: rolePerms }); } setUsers([...USERS]); setSaving(false); onClose(); };
        const handleDelete = () => { if (confirm('Delete this user?')) { USERS = USERS.filter(u => u.id !== userToEdit.id); setUsers([...USERS]); onClose(); } };
        return (
          <div style={styles.modal} onClick={onClose}><div style={styles.modalContent} onClick={e => e.stopPropagation()}>
            <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{userToEdit?.id ? '✏️ Edit User' : '➕ New User'}</h2>
            <div style={{ display: 'grid', gap: '12px' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Username *</label><input style={styles.input} value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666' }}>Full Name *</label><input style={styles.input} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></div></div>
              <div><label style={{ fontSize: '11px', color: '#666' }}>Email</label><input style={styles.input} type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} /></div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>PIN (4 digits) *</label><div style={{ display: 'flex', gap: '6px' }}><input style={{ ...styles.input, flex: 1 }} type={showPin ? 'text' : 'password'} maxLength={4} value={form.pin} onChange={e => setForm({ ...form, pin: e.target.value })} /><button style={{ ...styles.button, ...styles.secondaryBtn, padding: '8px' }} onClick={() => setShowPin(!showPin)}>{showPin ? '🙈' : '👁️'}</button></div></div><div><label style={{ fontSize: '11px', color: '#666' }}>Role *</label><select style={styles.input} value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}>{ROLES.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div></div>
              <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}><div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '6px' }}>Role Permissions</div><div style={{ fontSize: '11px', color: '#666' }}>{ROLES.find(r => r.id === form.role)?.description}</div></div>
              <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}><input type="checkbox" checked={form.active} onChange={e => setForm({ ...form, active: e.target.checked })} /> Active</label>
              <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>{userToEdit?.id && userToEdit.id !== user.id && <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>}<button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button><button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={saving || !form.username || !form.name || !form.pin}>Save</button></div>
            </div>
          </div></div>
        );
      };

      // DEVICE EDIT MODAL WITH PRESETS
      const DeviceEditModal = ({ deviceToEdit, onClose }) => {
        const [form, setForm] = useState(deviceToEdit || { type: 'scanner', name: '', model: '', connection: 'usb', port: '', enabled: true, config: {} });
        const [testing, setTesting] = useState(false);
        const [testResult, setTestResult] = useState(null);
        const [showPresets, setShowPresets] = useState(false);
        const deviceTypes = [{ id: 'scanner', name: 'Barcode Scanner', icon: '📷' }, { id: 'printer', name: 'Receipt Printer', icon: '🖨️' }, { id: 'scale', name: 'Scale', icon: '⚖️' }, { id: 'cashDrawer', name: 'Cash Drawer', icon: '💵' }, { id: 'cardReader', name: 'Card Reader', icon: '💳' }, { id: 'labelPrinter', name: 'Label Printer', icon: '🏷️' }, { id: 'customerDisplay', name: 'Customer Display', icon: '🖥️' }];
        const presets = HARDWARE_PRESETS[form.type] || [];
        const applyPreset = (preset) => { setForm({ ...form, model: preset.model, connection: preset.connection, name: form.name || deviceTypes.find(d => d.id === form.type)?.name || '' }); setShowPresets(false); };
        const handleSave = () => { if (deviceToEdit?.id) { const idx = DEVICES.findIndex(d => d.id === deviceToEdit.id); if (idx >= 0) DEVICES[idx] = { ...DEVICES[idx], ...form }; } else { DEVICES.push({ ...form, id: `dev${Date.now()}`, status: 'disconnected' }); } setDevices([...DEVICES]); onClose(); };
        const handleTest = async () => { setTesting(true); setTestResult(null); await new Promise(r => setTimeout(r, 1000)); setTestResult(Math.random() > 0.3 ? 'success' : 'failed'); setTesting(false); };
        const handleDelete = () => { if (confirm('Delete this device?')) { DEVICES = DEVICES.filter(d => d.id !== deviceToEdit.id); setDevices([...DEVICES]); onClose(); } };
        return (
          <div style={styles.modal} onClick={onClose}><div style={styles.modalContent} onClick={e => e.stopPropagation()}>
            <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{deviceToEdit?.id ? '✏️ Edit Device' : '➕ Add Device'}</h2>
            <div style={{ display: 'grid', gap: '12px' }}>
              <div><label style={{ fontSize: '11px', color: '#666' }}>Device Type</label><select style={styles.input} value={form.type} onChange={e => setForm({ ...form, type: e.target.value, model: '', connection: 'usb' })}>{deviceTypes.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}</select></div>
              {presets.length > 0 && (
                <div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: showPresets ? '10px' : 0 }}><span style={{ fontSize: '12px', fontWeight: '600', color: '#0f6e56' }}>📦 Recommended Hardware</span><button style={{ ...styles.button, ...styles.secondaryBtn, padding: '4px 10px', fontSize: '10px' }} onClick={() => setShowPresets(!showPresets)}>{showPresets ? 'Hide' : 'Show Options'}</button></div>
                  {showPresets && <div style={{ display: 'grid', gap: '6px' }}>{presets.map(preset => (<div key={preset.model} onClick={() => applyPreset(preset)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px', background: 'white', borderRadius: '6px', cursor: 'pointer', border: form.model === preset.model ? '2px solid #0f6e56' : '2px solid transparent' }}><div><div style={{ fontWeight: '600', fontSize: '12px' }}>{preset.model} {preset.recommended && <span style={{ color: '#0f6e56' }}>★</span>}</div><div style={{ fontSize: '10px', color: '#666' }}>{preset.features}</div></div><div style={{ textAlign: 'right' }}><div style={{ fontWeight: '700', color: '#0f6e56' }}>${preset.price}</div><div style={{ fontSize: '9px', color: '#888' }}>{preset.connection.toUpperCase()}</div></div></div>))}</div>}
                </div>
              )}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Device Name</label><input style={styles.input} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g., Main Scanner" /></div><div><label style={{ fontSize: '11px', color: '#666' }}>Model</label><input style={styles.input} value={form.model} onChange={e => setForm({ ...form, model: e.target.value })} placeholder="e.g., Zebra DS2208" /></div></div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Connection</label><select style={styles.input} value={form.connection} onChange={e => setForm({ ...form, connection: e.target.value })}>{['usb', 'serial', 'network', 'bluetooth', 'hdmi', 'printer'].map(c => <option key={c} value={c}>{c.toUpperCase()}</option>)}</select></div><div><label style={{ fontSize: '11px', color: '#666' }}>Port / Address</label><input style={styles.input} value={form.port} onChange={e => setForm({ ...form, port: e.target.value })} placeholder="/dev/ttyUSB0" /></div></div>
              {form.type === 'scale' && <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}><div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '8px' }}>Scale Settings</div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px' }}><div><label style={{ fontSize: '10px', color: '#666' }}>Unit</label><select style={{ ...styles.input, padding: '8px' }} value={form.config?.unit || 'lb'} onChange={e => setForm({ ...form, config: { ...form.config, unit: e.target.value } })}><option value="lb">Pounds</option><option value="kg">Kilograms</option></select></div><div><label style={{ fontSize: '10px', color: '#666' }}>Precision</label><select style={{ ...styles.input, padding: '8px' }} value={form.config?.precision || 2} onChange={e => setForm({ ...form, config: { ...form.config, precision: parseInt(e.target.value) } })}><option value={1}>0.1</option><option value={2}>0.01</option></select></div><div><label style={{ fontSize: '10px', color: '#666' }}>Baud Rate</label><select style={{ ...styles.input, padding: '8px' }} value={form.config?.baudRate || 9600} onChange={e => setForm({ ...form, config: { ...form.config, baudRate: parseInt(e.target.value) } })}><option value={9600}>9600</option><option value={19200}>19200</option></select></div></div></div>}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}><input type="checkbox" checked={form.enabled} onChange={e => setForm({ ...form, enabled: e.target.checked })} /> Enabled</label><button style={{ ...styles.button, ...styles.secondaryBtn }} onClick={handleTest} disabled={testing}>{testing ? '⏳ Testing...' : '🔌 Test'}</button></div>
              {testResult && <div style={{ padding: '10px', borderRadius: '8px', background: testResult === 'success' ? '#dcfce7' : '#fef2f2', color: testResult === 'success' ? '#166534' : '#b91c1c', fontSize: '12px' }}>{testResult === 'success' ? '✓ Connected' : '✗ Failed'}</div>}
              <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>{deviceToEdit?.id && <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>}<button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button><button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={!form.name}>Save</button></div>
            </div>
          </div></div>
        );
      };

      // PRODUCT EDIT MODAL
      const ProductEditModal = ({ product, onClose }) => {
        const [form, setForm] = useState(product || { name: '', price: '', category: 'vegetables', unitType: 'each', unit: 'each', stock: '', barcode: `00${Date.now().toString().slice(-5)}`, vendorId: 'farm-store', minStock: 10 });
        const selectedUnitType = UNIT_TYPES.find(u => u.id === form.unitType);
        const handleSave = () => { const data = { ...form, price: parseFloat(form.price), stock: parseInt(form.stock) || 0 }; if (product?.id) { for (const cat of Object.keys(PRODUCTS)) { const idx = PRODUCTS[cat].findIndex(p => p.id === product.id); if (idx >= 0) { PRODUCTS[cat][idx] = { ...PRODUCTS[cat][idx], ...data }; break; } } } else { if (!PRODUCTS[data.category]) PRODUCTS[data.category] = []; PRODUCTS[data.category].push({ ...data, id: `${data.category[0]}${Date.now()}`, image: 'https://images.unsplash.com/photo-1518843875459-f738682238a6?w=300&h=300&fit=crop' }); } setProducts({ ...PRODUCTS }); onClose(); };
        const handleDelete = () => { if (confirm('Delete this product?')) { for (const cat of Object.keys(PRODUCTS)) PRODUCTS[cat] = PRODUCTS[cat].filter(p => p.id !== product.id); setProducts({ ...PRODUCTS }); onClose(); } };
        return (
          <div style={styles.modal} onClick={onClose}><div style={styles.modalContent} onClick={e => e.stopPropagation()}>
            <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{product?.id ? '✏️ Edit Product' : '➕ New Product'}</h2>
            <div style={{ display: 'grid', gap: '12px' }}>
              <div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px' }}><label style={{ fontSize: '12px', fontWeight: '600', color: '#0f6e56' }}>Vendor</label><select style={{ ...styles.input, marginTop: '6px' }} value={form.vendorId} onChange={e => setForm({ ...form, vendorId: e.target.value })}>{Object.values(vendors).map(v => <option key={v.id} value={v.id}>{v.name} ({v.commissionRate}%)</option>)}</select></div>
              <input style={styles.input} placeholder="Product name *" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Category</label><select style={styles.input} value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>{CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}</select></div><div><label style={{ fontSize: '11px', color: '#666' }}>Price *</label><input style={styles.input} type="number" step="0.01" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666' }}>Stock</label><input style={styles.input} type="number" value={form.stock} onChange={e => setForm({ ...form, stock: e.target.value })} /></div></div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Unit Type</label><select style={styles.input} value={form.unitType} onChange={e => { const ut = UNIT_TYPES.find(u => u.id === e.target.value); setForm({ ...form, unitType: e.target.value, unit: ut.units[0] }); }}>{UNIT_TYPES.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select></div><div><label style={{ fontSize: '11px', color: '#666' }}>Unit</label><select style={styles.input} value={form.unit} onChange={e => setForm({ ...form, unit: e.target.value })}>{selectedUnitType?.units.map(u => <option key={u} value={u}>{u}</option>)}</select></div></div>
              <input style={styles.input} placeholder="Barcode" value={form.barcode} onChange={e => setForm({ ...form, barcode: e.target.value })} />
              <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>{product?.id && <button style={{ ...styles.button, ...styles.dangerBtn }} onClick={handleDelete}>Delete</button>}<button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button><button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={!form.name || !form.price}>Save</button></div>
            </div>
          </div></div>
        );
      };

      // VENDOR EDIT MODAL
      const VendorEditModal = ({ vendor, onClose }) => {
        const [form, setForm] = useState(vendor || { name: '', type: 'consignment', commissionRate: 15, contact: '', paymentMethod: 'check', paymentTerms: 'net-15', color: '#666666', active: true });
        const handleSave = () => { if (vendor?.id) { VENDORS[vendor.id] = { ...VENDORS[vendor.id], ...form }; } else { const id = form.name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''); VENDORS[id] = { ...form, id }; } setVendors({ ...VENDORS }); onClose(); };
        return (
          <div style={styles.modal} onClick={onClose}><div style={styles.modalContent} onClick={e => e.stopPropagation()}>
            <h2 style={{ margin: '0 0 20px', fontSize: '18px' }}>{vendor?.id ? '✏️ Edit Vendor' : '➕ New Vendor'}</h2>
            <div style={{ display: 'grid', gap: '12px' }}>
              <input style={styles.input} placeholder="Vendor name *" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Type</label><select style={styles.input} value={form.type} onChange={e => setForm({ ...form, type: e.target.value, commissionRate: e.target.value === 'owner' ? 0 : form.commissionRate })}><option value="owner">Farm Store</option><option value="consignment">Consignment</option></select></div><div><label style={{ fontSize: '11px', color: '#666' }}>Commission %</label><input style={styles.input} type="number" value={form.commissionRate} onChange={e => setForm({ ...form, commissionRate: parseFloat(e.target.value) || 0 })} disabled={form.type === 'owner'} /></div></div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666' }}>Payment</label><select style={styles.input} value={form.paymentMethod} onChange={e => setForm({ ...form, paymentMethod: e.target.value })}><option value="check">Check</option><option value="ach">ACH</option></select></div><div><label style={{ fontSize: '11px', color: '#666' }}>Terms</label><select style={styles.input} value={form.paymentTerms} onChange={e => setForm({ ...form, paymentTerms: e.target.value })}><option value="net-7">Net 7</option><option value="net-15">Net 15</option><option value="net-30">Net 30</option></select></div></div>
              <input style={styles.input} placeholder="Contact email" value={form.contact} onChange={e => setForm({ ...form, contact: e.target.value })} />
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}><label style={{ fontSize: '12px' }}>Color:</label><input type="color" value={form.color} onChange={e => setForm({ ...form, color: e.target.value })} style={{ width: '50px', height: '32px', border: 'none' }} /><label style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}><input type="checkbox" checked={form.active} onChange={e => setForm({ ...form, active: e.target.checked })} /> Active</label></div>
              <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}><button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={onClose}>Cancel</button><button style={{ ...styles.button, ...styles.primaryBtn, flex: 2 }} onClick={handleSave} disabled={!form.name}>Save</button></div>
            </div>
          </div></div>
        );
      };

      // PAYMENT MODAL
      const PaymentModal = () => {
        const [processing, setProcessing] = useState(false);

      // ADMIN VIEW (FIXED - no hooks inside, using component-level state)
      const renderAdmin = () => {

            <h2 style={{ margin: '0 0 16px', fontSize: '18px' }}>⚙️ Admin Settings</h2>
            <div style={{ display: 'flex', gap: '6px', marginBottom: '16px', flexWrap: 'wrap' }}>{adminSections.map(sec => (<button key={sec.id} style={{ ...styles.button, ...(adminSection === sec.id ? styles.primaryBtn : styles.secondaryBtn), fontSize: '11px' }} onClick={() => setAdminSection(sec.id)}>{sec.label}</button>))}</div>

            {adminSection === 'store' && (<div style={styles.card}><h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🏪 Store Information</h3><div style={{ display: 'grid', gap: '12px' }}><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Store Name</label><input style={styles.input} value={localSettings.storeName} onChange={e => setLocalSettings({ ...localSettings, storeName: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Address</label><input style={styles.input} value={localSettings.storeAddress} onChange={e => setLocalSettings({ ...localSettings, storeAddress: e.target.value })} /></div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Phone</label><input style={styles.input} value={localSettings.storePhone} onChange={e => setLocalSettings({ ...localSettings, storePhone: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Email</label><input style={styles.input} value={localSettings.storeEmail} onChange={e => setLocalSettings({ ...localSettings, storeEmail: e.target.value })} /></div></div><div style={{ borderTop: '1px solid #eee', paddingTop: '12px', marginTop: '4px' }}><h4 style={{ margin: '0 0 10px', fontSize: '13px' }}>Receipt Settings</h4><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Receipt Header</label><input style={styles.input} value={localSettings.receiptHeader} onChange={e => setLocalSettings({ ...localSettings, receiptHeader: e.target.value })} /></div><div style={{ marginTop: '10px' }}><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Receipt Footer</label><input style={styles.input} value={localSettings.receiptFooter} onChange={e => setLocalSettings({ ...localSettings, receiptFooter: e.target.value })} /></div></div><div style={{ borderTop: '1px solid #eee', paddingTop: '12px', marginTop: '4px' }}><h4 style={{ margin: '0 0 10px', fontSize: '13px' }}>Kiosk Settings</h4><div style={{ display: 'flex', flexWrap: 'wrap', gap: '16px' }}><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.kioskEnabled} onChange={e => setLocalSettings({ ...localSettings, kioskEnabled: e.target.checked })} /> Kiosk Mode Enabled</label><div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><label style={{ fontSize: '12px' }}>Timeout (sec):</label><input style={{ ...styles.input, width: '80px' }} type="number" value={localSettings.kioskTimeout} onChange={e => setLocalSettings({ ...localSettings, kioskTimeout: parseInt(e.target.value) })} /></div></div></div><button style={{ ...styles.button, ...styles.primaryBtn, marginTop: '8px' }} onClick={saveAdminSettings} disabled={adminSaving}>{adminSaving ? 'Saving...' : '💾 Save Store Settings'}</button></div></div>)}

            {adminSection === 'users' && (<div style={styles.card}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}><h3 style={{ margin: 0, fontSize: '15px' }}>👥 User Management</h3><button style={{ ...styles.button, ...styles.primaryBtn }} onClick={() => setEditingUser({})}>➕ Add User</button></div><div style={{ display: 'grid', gap: '8px' }}>{users.map(u => (<div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: '#f8f7f4', borderRadius: '8px', cursor: 'pointer' }} onClick={() => setEditingUser(u)}><div><div style={{ fontWeight: '600', fontSize: '13px' }}>{u.name}</div><div style={{ fontSize: '11px', color: '#666' }}>@{u.username} • {u.email || 'No email'}</div></div><div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><span style={{ padding: '3px 10px', borderRadius: '10px', fontSize: '10px', fontWeight: '600', background: u.role === 'admin' ? '#fef3c7' : u.role === 'manager' ? '#e0e7ff' : '#f0fdf4', color: u.role === 'admin' ? '#92400e' : u.role === 'manager' ? '#4338ca' : '#166534' }}>{u.role}</span>{!u.active && <span style={{ padding: '3px 8px', borderRadius: '10px', fontSize: '9px', background: '#fef2f2', color: '#b91c1c' }}>Inactive</span>}</div></div>))}</div></div>)}

            {adminSection === 'devices' && (<div style={styles.card}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}><h3 style={{ margin: 0, fontSize: '15px' }}>🔌 Peripheral Devices</h3><button style={{ ...styles.button, ...styles.primaryBtn }} onClick={() => setEditingDevice({})}>➕ Add Device</button></div><div style={{ display: 'grid', gap: '8px' }}>{devices.map(device => { const icons = { scanner: '📷', printer: '🖨️', scale: '⚖️', cashDrawer: '💵', cardReader: '💳', labelPrinter: '🏷️', customerDisplay: '🖥️' }; return (<div key={device.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', borderRadius: '10px', border: `2px solid ${device.status === 'connected' ? '#22c55e' : '#f59e0b'}`, background: device.enabled ? 'white' : '#f9fafb', opacity: device.enabled ? 1 : 0.7, cursor: 'pointer' }} onClick={() => setEditingDevice(device)}><div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}><span style={{ fontSize: '24px' }}>{icons[device.type]}</span><div><div style={{ fontWeight: '600', fontSize: '13px' }}>{device.name}</div><div style={{ fontSize: '10px', color: '#666' }}>{device.model} • {device.connection.toUpperCase()}</div></div></div><div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}><span style={{ padding: '3px 8px', borderRadius: '10px', fontSize: '10px', fontWeight: '600', background: device.status === 'connected' ? '#dcfce7' : '#fef3c7', color: device.status === 'connected' ? '#166534' : '#92400e' }}>{device.status}</span></div></div>); })}</div></div>)}

            {adminSection === 'payments' && (<div style={styles.card}><h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>💳 Payment Processing</h3><div style={{ display: 'grid', gap: '12px' }}><div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '4px' }}>Select Payment Processor</div><div style={{ display: 'grid', gap: '8px' }}>{PAYMENT_PROCESSORS.map(proc => (<div key={proc.id} onClick={() => setLocalSettings({ ...localSettings, paymentProcessor: proc.id })} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px', borderRadius: '10px', border: localSettings.paymentProcessor === proc.id ? '2px solid #0f6e56' : '2px solid #e0ddd5', cursor: 'pointer', background: localSettings.paymentProcessor === proc.id ? '#f0fdf4' : 'white' }}><div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}><span style={{ fontSize: '24px' }}>{proc.logo}</span><div><div style={{ fontWeight: '600', fontSize: '14px' }}>{proc.name} {proc.recommended && <span style={{ color: '#0f6e56', fontSize: '12px' }}>★ Recommended</span>}</div><div style={{ fontSize: '11px', color: '#666' }}>{proc.features}</div></div></div><div style={{ textAlign: 'right' }}><div style={{ fontWeight: '700', color: '#0f6e56' }}>{proc.rate}</div><div style={{ fontSize: '10px', color: '#888' }}>per transaction</div></div></div>))}</div><div style={{ borderTop: '1px solid #eee', paddingTop: '12px', marginTop: '4px' }}><h4 style={{ margin: '0 0 10px', fontSize: '13px' }}>API Configuration</h4><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>API Key / Secret Key</label><input style={styles.input} type="password" placeholder={`${localSettings.paymentProcessor} API key`} value={localSettings.paymentApiKey} onChange={e => setLocalSettings({ ...localSettings, paymentApiKey: e.target.value })} /></div><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', marginTop: '10px' }}><input type="checkbox" checked={localSettings.paymentTestMode} onChange={e => setLocalSettings({ ...localSettings, paymentTestMode: e.target.checked })} /> Test Mode (no real charges)</label></div><div style={{ background: '#f0f9ff', padding: '12px', borderRadius: '8px', fontSize: '11px', color: '#0369a1' }}><strong>💡 Recommended for Self-Service:</strong> Stripe Terminal M2 ($59) - tap/chip/swipe, Bluetooth, best API for unattended payments.</div><button style={{ ...styles.button, ...styles.primaryBtn, marginTop: '8px' }} onClick={saveAdminSettings} disabled={adminSaving}>{adminSaving ? 'Saving...' : '💾 Save Payment Settings'}</button></div></div>)}

            {adminSection === 'database' && (<div style={styles.card}><h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🗄️ Database Configuration</h3><div style={{ display: 'grid', gap: '12px' }}><div style={{ padding: '12px', borderRadius: '8px', background: localSettings.dbConnected ? '#dcfce7' : '#fef2f2', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><div><div style={{ fontWeight: '600', color: localSettings.dbConnected ? '#166534' : '#b91c1c' }}>{localSettings.dbConnected ? '✓ Connected' : '✗ Disconnected'}</div>{localSettings.dbLastSync && <div style={{ fontSize: '10px', color: '#666' }}>Last sync: {new Date(localSettings.dbLastSync).toLocaleString()}</div>}</div><button style={{ ...styles.button, ...(localSettings.dbConnected ? styles.secondaryBtn : styles.primaryBtn) }} onClick={testDbConnection} disabled={testingDb}>{testingDb ? 'Testing...' : 'Test Connection'}</button></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Database Type</label><select style={styles.input} value={localSettings.dbType} onChange={e => setLocalSettings({ ...localSettings, dbType: e.target.value })}><option value="postgresql">PostgreSQL</option><option value="sqlite">SQLite (Local)</option><option value="odoo">Odoo Backend</option></select></div>{localSettings.dbType !== 'sqlite' && (<><div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Host</label><input style={styles.input} value={localSettings.dbHost} onChange={e => setLocalSettings({ ...localSettings, dbHost: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Port</label><input style={styles.input} type="number" value={localSettings.dbPort} onChange={e => setLocalSettings({ ...localSettings, dbPort: parseInt(e.target.value) })} /></div></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Database Name</label><input style={styles.input} value={localSettings.dbName} onChange={e => setLocalSettings({ ...localSettings, dbName: e.target.value })} /></div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Username</label><input style={styles.input} value={localSettings.dbUser} onChange={e => setLocalSettings({ ...localSettings, dbUser: e.target.value })} /></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>Password</label><input style={styles.input} type="password" value={localSettings.dbPassword} onChange={e => setLocalSettings({ ...localSettings, dbPassword: e.target.value })} /></div></div></>)}<div style={{ background: '#f0f9ff', padding: '12px', borderRadius: '8px', fontSize: '11px', color: '#0369a1' }}><strong>💡 Raspberry Pi 5:</strong> PostgreSQL pre-installed. Default: localhost:5432, database: farm_pos</div><button style={{ ...styles.button, ...styles.primaryBtn }} onClick={saveAdminSettings} disabled={adminSaving}>{adminSaving ? 'Saving...' : '💾 Save Database Settings'}</button></div></div>)}

            {adminSection === 'farmos' && (<div style={styles.card}><h3 style={{ margin: '0 0 16px', fontSize: '15px' }}>🌱 farmOS Integration</h3><div style={{ display: 'grid', gap: '12px' }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: '#f8f7f4', borderRadius: '8px' }}><div><span style={{ fontWeight: '600' }}>Enable farmOS Sync</span><div style={{ fontSize: '11px', color: '#666' }}>Sync harvests, sales, and inventory</div></div><button style={{ ...styles.toggle, background: localSettings.farmosEnabled ? '#0f6e56' : '#ccc' }} onClick={() => setLocalSettings({ ...localSettings, farmosEnabled: !localSettings.farmosEnabled })}><div style={{ ...styles.toggleKnob, left: localSettings.farmosEnabled ? '23px' : '3px' }} /></button></div>{localSettings.farmosEnabled && (<><div style={{ padding: '12px', borderRadius: '8px', background: localSettings.farmosStatus === 'connected' ? '#dcfce7' : '#fef3c7', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><div><div style={{ fontWeight: '600', color: localSettings.farmosStatus === 'connected' ? '#166534' : '#92400e' }}>{localSettings.farmosStatus === 'connected' ? '✓ Connected' : '○ Not connected'}</div>{localSettings.farmosLastSync && <div style={{ fontSize: '10px', color: '#666' }}>Last sync: {new Date(localSettings.farmosLastSync).toLocaleString()}</div>}</div><button style={{ ...styles.button, ...styles.secondaryBtn }} onClick={testFarmosConnection} disabled={testingFarmos}>{testingFarmos ? 'Testing...' : 'Test Connection'}</button></div><div><label style={{ fontSize: '11px', color: '#666', display: 'block', marginBottom: '4px' }}>farmOS Server URL</label><input style={styles.input} value={localSettings.farmosUrl} onChange={e => setLocalSettings({ ...localSettings, farmosUrl: e.target.value })} placeholder="https://your-farm.farmos.net" /></div><div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}><div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '10px' }}>OAuth 2.0 Credentials</div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}><div><label style={{ fontSize: '10px', color: '#666' }}>Client ID</label><input style={{ ...styles.input, padding: '8px' }} value={localSettings.farmosClientId} onChange={e => setLocalSettings({ ...localSettings, farmosClientId: e.target.value })} /></div><div><label style={{ fontSize: '10px', color: '#666' }}>Client Secret</label><input style={{ ...styles.input, padding: '8px' }} type="password" value={localSettings.farmosClientSecret} onChange={e => setLocalSettings({ ...localSettings, farmosClientSecret: e.target.value })} /></div></div></div><div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}><label style={{ fontSize: '12px' }}>Sync Interval:</label><select style={{ ...styles.input, width: '150px' }} value={localSettings.farmosSyncInterval} onChange={e => setLocalSettings({ ...localSettings, farmosSyncInterval: parseInt(e.target.value) })}><option value={5}>Every 5 minutes</option><option value={15}>Every 15 minutes</option><option value={30}>Every 30 minutes</option><option value={60}>Every hour</option></select></div><div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px' }}><div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '8px', color: '#0f6e56' }}>Sync Options</div><div style={{ display: 'grid', gap: '6px' }}><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncHarvests} onChange={e => setLocalSettings({ ...localSettings, farmosSyncHarvests: e.target.checked })} /> Harvest logs → Inventory</label><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncSales} onChange={e => setLocalSettings({ ...localSettings, farmosSyncSales: e.target.checked })} /> Sales → farmOS observations</label><label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' }}><input type="checkbox" checked={localSettings.farmosSyncInventory} onChange={e => setLocalSettings({ ...localSettings, farmosSyncInventory: e.target.checked })} /> Import farmOS assets as products</label></div></div></>)}<button style={{ ...styles.button, ...styles.primaryBtn }} onClick={saveAdminSettings} disabled={adminSaving}>{adminSaving ? 'Saving...' : '💾 Save farmOS Settings'}</button></div></div>)}
          </div>
        );
      };

      // SETTLEMENT MODAL
      const SettlementModal = () => (
        <div style={styles.modal} onClick={() => setShowSettlement(false)}><div style={{ ...styles.modalContent, maxWidth: '700px' }} onClick={e => e.stopPropagation()}><h2 style={{ margin: '0 0 16px', fontSize: '18px' }}>💰 Settlement Report</h2><div style={{ display: 'grid', gap: '10px' }}>{Object.values(vendors).filter(v => v.type === 'consignment').map(vendor => (<div key={vendor.id} style={{ padding: '14px', borderRadius: '10px', border: `2px solid ${vendor.color}` }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><span style={{ width: '10px', height: '10px', borderRadius: '50%', background: vendor.color }} /><span style={{ fontWeight: '600' }}>{vendor.name}</span><span style={{ fontSize: '10px', color: '#888' }}>{vendor.commissionRate}%</span></div><button style={{ ...styles.button, ...styles.primaryBtn, padding: '4px 10px', fontSize: '10px' }}>Process</button></div><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px', marginTop: '10px', fontSize: '11px' }}><div><div style={{ color: '#888' }}>Gross</div><div style={{ fontWeight: '600' }}>$0.00</div></div><div><div style={{ color: '#888' }}>Commission</div><div style={{ fontWeight: '600', color: '#dc2626' }}>-$0.00</div></div><div><div style={{ color: '#888' }}>Net Payable</div><div style={{ fontWeight: '700', color: '#0f6e56' }}>$0.00</div></div></div></div>))}</div><button style={{ ...styles.button, ...styles.secondaryBtn, width: '100%', marginTop: '16px' }} onClick={() => setShowSettlement(false)}>Close</button></div></div>
      );

      // MAIN RENDER
      return (
        <div style={styles.app}>
          <header style={styles.header}><div style={styles.logo}><span style={{ fontSize: '22px' }}>🌱</span><div><div>{settings.storeName.split(' ').slice(0, 3).join(' ')}</div><div style={{ fontSize: '9px', opacity: 0.8, fontWeight: '400' }}>{user.role.charAt(0).toUpperCase() + user.role.slice(1)}: {user.name}</div></div></div><div style={styles.tabs}>{availableViews.map(tab => (<button key={tab.id} style={{ ...styles.tab, ...(view === tab.id ? styles.tabActive : styles.tabInactive) }} onClick={() => setView(tab.id)}>{tab.label}</button>))}</div><button style={{ ...styles.button, background: 'rgba(255,255,255,0.15)', color: 'white', fontSize: '11px' }} onClick={logout}>Logout</button></header>
          {view === 'pos' && renderPOS()}
          {view === 'kiosk' && renderKiosk()}
          {view === 'vendors' && renderVendors()}
          {view === 'inventory' && renderInventory()}
          {view === 'admin' && renderAdmin()}
          {editingProduct !== null && <ProductEditModal product={editingProduct.id ? editingProduct : null} onClose={() => setEditingProduct(null)} />}
          {editingVendor !== null && <VendorEditModal vendor={editingVendor.id ? editingVendor : null} onClose={() => setEditingVendor(null)} />}
          {editingUser !== null && <UserEditModal userToEdit={editingUser.id ? editingUser : null} onClose={() => setEditingUser(null)} />}
          {editingDevice !== null && <DeviceEditModal deviceToEdit={editingDevice.id ? editingDevice : null} onClose={() => setEditingDevice(null)} />}
          {showPayment && <PaymentModal />}
          {showSettlement && <SettlementModal />}
        </div>
      );
    }

    // APP ROOT
    function App() { return <AuthProvider><AppContent /></AuthProvider>; }
    function AppContent() { const { user, loading } = useAuth(); if (loading) return <div className="loading">Loading...</div>; return user ? <MainApp /> : <LoginScreen />; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
