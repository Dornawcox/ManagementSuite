        login: async (username, pin) => {
          await API.delay(300);
          const user = USERS.find(u => u.username === username && u.pin === pin);
          if (user) {
            return { success: true, user: { ...user, pin: undefined }, token: `token_${Date.now()}` };
          }
          return { success: false, error: 'Invalid credentials' };
        },
        logout: async () => {
          await API.delay(100);
          return { success: true };
        },
        validateToken: async (token) => {
          await API.delay(100);
          return { valid: token?.startsWith('token_') };
        }

        list: async () => ({ data: Object.values(VENDORS) }),
        get: async (id) => ({ data: VENDORS[id] }),

          const id = `vendor_${Date.now()}`;
          VENDORS[id] = { ...vendor, id };
          return { data: VENDORS[id] };
        },
        update: async (id, updates) => {
          VENDORS[id] = { ...VENDORS[id], ...updates };
          return { data: VENDORS[id] };
        },
        delete: async (id) => {
          delete VENDORS[id];
          return { success: true };
        }
      },
      
      // Product endpoints
      products: {
        list: async (filters) => {
          let products = Object.values(PRODUCTS).flat();
          if (filters?.vendorId) {
            products = products.filter(p => p.vendorId === filters.vendorId);
          }
          if (filters?.category) {
            products = products.filter(p => p.category === filters.category);
          }
          return { data: products };
        },
        get: async (id) => {
          const product = Object.values(PRODUCTS).flat().find(p => p.id === id);
          return { data: product };
        },
        create: async (product) => {
          const id = `${product.category[0]}${Date.now()}`;
          const newProduct = { ...product, id };
          if (!PRODUCTS[product.category]) PRODUCTS[product.category] = [];
          PRODUCTS[product.category].push(newProduct);
          return { data: newProduct };
        },
        update: async (id, updates) => {
          for (const cat of Object.keys(PRODUCTS)) {
            const idx = PRODUCTS[cat].findIndex(p => p.id === id);
            if (idx >= 0) {
              PRODUCTS[cat][idx] = { ...PRODUCTS[cat][idx], ...updates };
              return { data: PRODUCTS[cat][idx] };
            }
          }
          return { error: 'Product not found' };
        },
        delete: async (id) => {
          for (const cat of Object.keys(PRODUCTS)) {
            const idx = PRODUCTS[cat].findIndex(p => p.id === id);
            if (idx >= 0) {
              PRODUCTS[cat].splice(idx, 1);
              return { success: true };
            }
          }
          return { error: 'Product not found' };
        },
        updateStock: async (id, quantity, action) => {
          for (const cat of Object.keys(PRODUCTS)) {
            const idx = PRODUCTS[cat].findIndex(p => p.id === id);
            if (idx >= 0) {
              PRODUCTS[cat][idx].stock = action === 'add' 
                ? PRODUCTS[cat][idx].stock + quantity 
                : PRODUCTS[cat][idx].stock - quantity;
              return { data: PRODUCTS[cat][idx] };
            }
          }
          return { error: 'Product not found' };
        }
      },
      
      // Transaction endpoints
      transactions: {
        create: async (transaction) => {
          const id = `txn_${Date.now()}`;
          const newTxn = { ...transaction, id, createdAt: new Date().toISOString() };
          TRANSACTIONS.push(newTxn);
          return { data: newTxn };
        },
        list: async (filters) => {
          let txns = [...TRANSACTIONS];
          if (filters?.startDate) {
            txns = txns.filter(t => t.createdAt >= filters.startDate);
          }
          if (filters?.endDate) {
            txns = txns.filter(t => t.createdAt <= filters.endDate);
          }
          return { data: txns };
        }

      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Check for saved session
        const savedUser = localStorage.getItem('pos_user');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
        }
        setLoading(false);
      }, []);

      const login = async (username, pin) => {
        const result = await API.auth.login(username, pin);
        if (result.success) {
          setUser(result.user);
          localStorage.setItem('pos_user', JSON.stringify(result.user));
          localStorage.setItem('pos_token', result.token);
        }
        return result;
      };

      const logout = async () => {
        await API.auth.logout();
        setUser(null);
        localStorage.removeItem('pos_user');
        localStorage.removeItem('pos_token');
      };

      const hasPermission = (permission) => {
        if (!user) return false;
        if (user.permissions.includes('all')) return true;
        return user.permissions.includes(permission);
      };

      return (
        <AuthContext.Provider value={{ user, login, logout, hasPermission, loading }}>
          {children}
        </AuthContext.Provider>
      );

    // ============================================

    // ============================================
    function MainApp() {
      const { user, logout, hasPermission } = useAuth();

      const [products, setProducts] = useState(PRODUCTS);
      const [vendors, setVendors] = useState(VENDORS);
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('vegetables');
      const [scaleProduct, setScaleProduct] = useState(null);
      const [weight, setWeight] = useState(0);
      const [stable, setStable] = useState(true);
      const [language, setLanguage] = useState('en');
      const [vendorFilter, setVendorFilter] = useState('all');
      const [scannerInput, setScannerInput] = useState('');
      
      // Modal states
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingVendor, setEditingVendor] = useState(null);
      const [showPayment, setShowPayment] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showDevices, setShowDevices] = useState(false);
      const [showSettlement, setShowSettlement] = useState(false);

      // Scale simulation
      const simulateWeigh = useCallback(() => {
        setStable(false);
        const targetWeight = (Math.random() * 3 + 0.5).toFixed(2);
        let current = 0;
        const interval = setInterval(() => {
          current += parseFloat(targetWeight) / 10;
          if (current >= parseFloat(targetWeight)) {
            setWeight(parseFloat(targetWeight));
            setStable(true);
            clearInterval(interval);
          } else {
            setWeight(parseFloat(current.toFixed(2)));
          }
        }, 100);
      }, []);

      const findProductByBarcode = (barcode) => {
        for (const category of Object.keys(products)) {
          const product = products[category].find(p => p.barcode === barcode);
          if (product) return { product, category };
        }
        return null;
      };

      const addToCart = (product, quantity, weightValue = null) => {
        const isWeight = product.unitType === 'weight';
        const actualQuantity = weightValue || quantity;
        const lineTotal = isWeight ? product.price * actualQuantity : product.price * quantity;
        const vendor = vendors[product.vendorId];
        
        if (!isWeight) {
          const existingIndex = cart.findIndex(item => item.id === product.id);
          if (existingIndex >= 0) {
            const newCart = [...cart];
            newCart[existingIndex].quantity += quantity;
            newCart[existingIndex].total = newCart[existingIndex].quantity * product.price;
            setCart(newCart);
            return;
          }
        }
        
        setCart([...cart, {
          ...product,
          cartId: `cart_${Date.now()}_${Math.random()}`,
          quantity: isWeight ? actualQuantity : quantity,
          total: lineTotal,
          isWeight,
          vendorName: vendor?.name || 'Unknown',
          vendorColor: vendor?.color || '#666',
          commissionRate: vendor?.commissionRate || 0,
        }]);
      };

      const updateCartItem = (cartId, updates) => {
        setCart(cart.map(item => {
          if (item.cartId === cartId) {
            const newItem = { ...item, ...updates };
            newItem.total = newItem.isWeight ? newItem.price * newItem.quantity : newItem.price * newItem.quantity;
            return newItem;
          }
          return item;
        }));
      };

      const removeCartItem = (cartId) => {
        setCart(cart.filter(item => item.cartId !== cartId));
      };

      const refreshProducts = () => setProducts({ ...PRODUCTS });
      const refreshVendors = () => setVendors({ ...VENDORS });

      const cartTotal = cart.reduce((sum, item) => sum + item.total, 0);

      const cartByVendor = useMemo(() => {
        const grouped = {};
        cart.forEach(item => {
          if (!grouped[item.vendorId]) {
            grouped[item.vendorId] = { vendor: vendors[item.vendorId], items: [], subtotal: 0 };
          }
          grouped[item.vendorId].items.push(item);
          grouped[item.vendorId].subtotal += item.total;
        });
        return grouped;
      }, [cart, vendors]);

      // Determine available views based on role
      const availableViews = useMemo(() => {
        const views = [];
        if (hasPermission('pos') || hasPermission('all')) views.push({ id: 'pos', label: '👤 POS' });
        if (hasPermission('kiosk') || hasPermission('all')) views.push({ id: 'kiosk', label: '🖥️ Kiosk' });

        if (hasPermission('inventory') || hasPermission('all')) views.push({ id: 'inventory', label: '📦 Inventory' });
        if (hasPermission('settings') || hasPermission('all')) views.push({ id: 'admin', label: '⚙️ Admin' });

                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', fontSize: '12px' }}>
                    <div style={{ background: '#f8f7f4', padding: '8px', borderRadius: '6px' }}>
                      <div style={{ fontWeight: '600', color: '#0f6e56' }}>{vendorProducts.length}</div>
                      <div style={{ fontSize: '10px', color: '#666' }}>Products</div>
                    </div>
                    <div style={{ background: '#f8f7f4', padding: '8px', borderRadius: '6px' }}>
                      <div style={{ fontWeight: '600', color: '#185FA5' }}>{vendor.paymentTerms}</div>
                      <div style={{ fontSize: '10px', color: '#666' }}>Terms</div>
                    </div>
                  </div>
                  <div style={{ marginTop: '10px', fontSize: '11px', color: '#888' }}>{vendor.contact}</div>
                </div>
              );
            })}
          </div>
        </div>
      );

      // ============================================
      // INVENTORY VIEW
      // ============================================
      const renderInventory = () => {
        const allProducts = Object.values(products).flat();
        const filtered = vendorFilter === 'all' ? allProducts : allProducts.filter(p => p.vendorId === vendorFilter);

        return (
          <div style={{ padding: '16px', maxWidth: '1400px', margin: '0 auto' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', flexWrap: 'wrap', gap: '10px' }}>
              <h2 style={{ margin: 0, fontSize: '18px' }}>📦 Inventory</h2>
              <div style={{ display: 'flex', gap: '8px' }}>
                <select style={{ ...styles.input, width: '150px' }} value={vendorFilter} onChange={e => setVendorFilter(e.target.value)}>
                  <option value="all">All Vendors</option>
                  {Object.values(vendors).map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                </select>
                <button style={{ ...styles.button, ...styles.primaryBtn }} onClick={() => setEditingProduct({})}>➕ Add Product</button>
              </div>
            </div>

            <div style={{ ...styles.card, overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: '700px', fontSize: '12px' }}>
                <thead>
                  <tr style={{ background: '#0f6e56', color: 'white' }}>
                    <th style={{ padding: '10px', textAlign: 'left' }}>Product</th>
                    <th style={{ padding: '10px', textAlign: 'left' }}>Vendor</th>
                    <th style={{ padding: '10px', textAlign: 'left' }}>SKU</th>
                    <th style={{ padding: '10px', textAlign: 'right' }}>Price</th>
                    <th style={{ padding: '10px', textAlign: 'right' }}>Stock</th>
                    <th style={{ padding: '10px', textAlign: 'center' }}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(product => {
                    const vendor = vendors[product.vendorId];
                    return (
                      <tr key={product.id} style={{ borderBottom: '1px solid #eee' }}>
                        <td style={{ padding: '10px' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <img src={product.image} alt="" style={{ width: '36px', height: '36px', borderRadius: '6px', objectFit: 'cover' }} />
                            <div>
                              <div style={{ fontWeight: '500' }}>{product.name}</div>
                              <div style={{ fontSize: '10px', color: '#888' }}>{product.category}</div>
                            </div>
                          </div>
                        </td>
                        <td style={{ padding: '10px' }}>
                          <span style={{ ...styles.vendorBadge, background: vendor?.color }}>{vendor?.name}</span>
                        </td>
                        <td style={{ padding: '10px', fontFamily: 'monospace', fontSize: '11px' }}>{product.sku || product.barcode}</td>
                        <td style={{ padding: '10px', textAlign: 'right', fontWeight: '600' }}>${product.price.toFixed(2)}/{product.unit}</td>
                        <td style={{ padding: '10px', textAlign: 'right', fontWeight: '600', color: product.stock < product.minStock ? '#dc2626' : '#0f6e56' }}>
                          {product.stock}
                          {product.stock < product.minStock && <span style={{ marginLeft: '4px', fontSize: '10px' }}>⚠️</span>}
                        </td>
                        <td style={{ padding: '10px', textAlign: 'center' }}>
                          <button style={{ ...styles.button, ...styles.secondaryBtn, padding: '4px 10px', fontSize: '10px' }} onClick={() => setEditingProduct(product)}>
                            Edit
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '12px', marginTop: '16px' }}>
              <div style={{ ...styles.card, background: '#f0fdf4', textAlign: 'center' }}>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#0f6e56' }}>{allProducts.length}</div>
                <div style={{ fontSize: '11px', color: '#666' }}>Total Products</div>
              </div>
              <div style={{ ...styles.card, background: '#fef3c7', textAlign: 'center' }}>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#92400e' }}>{allProducts.filter(p => p.stock < p.minStock).length}</div>
                <div style={{ fontSize: '11px', color: '#666' }}>Low Stock</div>
              </div>
              <div style={{ ...styles.card, background: '#eff6ff', textAlign: 'center' }}>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#1e40af' }}>{allProducts.reduce((s, p) => s + p.stock, 0)}</div>
                <div style={{ fontSize: '11px', color: '#666' }}>Total Units</div>
              </div>
              <div style={{ ...styles.card, background: '#fdf2f8', textAlign: 'center' }}>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#9d174d' }}>${allProducts.reduce((s, p) => s + p.stock * p.price, 0).toFixed(0)}</div>
                <div style={{ fontSize: '11px', color: '#666' }}>Value</div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // ADMIN VIEW
      // ============================================
      const renderAdmin = () => (
        <div style={{ padding: '16px', maxWidth: '900px', margin: '0 auto' }}>
          <h2 style={{ margin: '0 0 16px', fontSize: '18px' }}>⚙️ Admin Settings</h2>

          <div style={{ display: 'grid', gap: '12px' }}>
            <div style={{ ...styles.card, cursor: 'pointer' }} onClick={() => setShowDevices(true)}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontWeight: '600', marginBottom: '4px' }}>🔌 Peripheral Devices</div>
                  <div style={{ fontSize: '12px', color: '#666' }}>{DEVICES.filter(d => d.enabled).length} devices enabled</div>
                </div>
                <span style={{ fontSize: '20px' }}>→</span>
              </div>
            </div>

            <div style={styles.card}>
              <div style={{ fontWeight: '600', marginBottom: '12px' }}>👥 User Accounts</div>
              <div style={{ display: 'grid', gap: '8px' }}>
                {USERS.map(u => (
                  <div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px', background: '#f8f7f4', borderRadius: '8px' }}>
                    <div>
                      <span style={{ fontWeight: '500', fontSize: '13px' }}>{u.name}</span>
                      <span style={{ marginLeft: '8px', padding: '2px 8px', borderRadius: '10px', fontSize: '10px', background: u.role === 'admin' ? '#fef3c7' : '#e0e7ff', color: u.role === 'admin' ? '#92400e' : '#4338ca' }}>{u.role}</span>
                    </div>
                    <span style={{ fontSize: '11px', color: '#888' }}>PIN: ****</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={styles.card}>
              <div style={{ fontWeight: '600', marginBottom: '12px' }}>🏪 Store Settings</div>
              <div style={{ display: 'grid', gap: '10px' }}>
                <div>
                  <label style={{ fontSize: '11px', color: '#666' }}>Store Name</label>
                  <input style={styles.input} value={SETTINGS.storeName} onChange={e => SETTINGS.storeName = e.target.value} />
                </div>
                <div>
                  <label style={{ fontSize: '11px', color: '#666' }}>Receipt Header</label>
                  <input style={styles.input} value={SETTINGS.receiptHeader} onChange={e => SETTINGS.receiptHeader = e.target.value} />
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <label style={{ fontSize: '12px' }}>Kiosk Mode Enabled</label>
                  <input type="checkbox" checked={SETTINGS.kioskEnabled} onChange={e => SETTINGS.kioskEnabled = e.target.checked} />
                </div>
              </div>
            </div>

            <div style={{ ...styles.card, background: '#f0f9ff', borderLeft: '4px solid #0ea5e9' }}>
              <div style={{ fontWeight: '600', marginBottom: '8px', color: '#0369a1' }}>🗄️ Database</div>
              <div style={{ fontSize: '12px', color: '#0c4a6e' }}>
                <p style={{ marginBottom: '8px' }}>Target: PostgreSQL on Raspberry Pi 5</p>
                <p>API: REST/JSON compatible with Odoo integration</p>
              </div>
            </div>
          </div>
        </div>
      );

      // ============================================
      // SETTLEMENT MODAL
      // ============================================
      const SettlementModal = () => {
        const settlements = useMemo(() => {
          const data = {};
          Object.values(vendors).forEach(v => {
            data[v.id] = { vendor: v, gross: 0, commission: 0, net: 0, items: 0 };
          });
          TRANSACTIONS.forEach(txn => {
            txn.items.forEach(item => {
              if (data[item.vendorId]) {
                const comm = item.total * (vendors[item.vendorId]?.commissionRate || 0) / 100;
                data[item.vendorId].gross += item.total;
                data[item.vendorId].commission += comm;
                data[item.vendorId].net += item.total - comm;
                data[item.vendorId].items += item.quantity;
              }
            });
          });
          return data;
        }, []);

        return (
          <div style={styles.modal} onClick={() => setShowSettlement(false)}>
            <div style={{ ...styles.modalContent, maxWidth: '700px' }} onClick={e => e.stopPropagation()}>
              <h2 style={{ margin: '0 0 16px', fontSize: '18px' }}>💰 Settlement Report</h2>
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', marginBottom: '16px' }}>
                <div style={{ background: '#f0fdf4', padding: '14px', borderRadius: '10px', textAlign: 'center' }}>
                  <div style={{ fontSize: '22px', fontWeight: '700', color: '#0f6e56' }}>${Object.values(settlements).reduce((s, v) => s + v.gross, 0).toFixed(2)}</div>
                  <div style={{ fontSize: '11px', color: '#666' }}>Total Sales</div>
                </div>
                <div style={{ background: '#fef3c7', padding: '14px', borderRadius: '10px', textAlign: 'center' }}>
                  <div style={{ fontSize: '22px', fontWeight: '700', color: '#92400e' }}>${Object.values(settlements).reduce((s, v) => s + v.commission, 0).toFixed(2)}</div>
                  <div style={{ fontSize: '11px', color: '#666' }}>Commission</div>
                </div>
                <div style={{ background: '#eff6ff', padding: '14px', borderRadius: '10px', textAlign: 'center' }}>
                  <div style={{ fontSize: '22px', fontWeight: '700', color: '#1e40af' }}>${Object.values(settlements).filter(v => v.vendor.type === 'consignment').reduce((s, v) => s + v.net, 0).toFixed(2)}</div>
                  <div style={{ fontSize: '11px', color: '#666' }}>Due to Vendors</div>
                </div>
              </div>

              <div style={{ display: 'grid', gap: '10px' }}>
                {Object.values(settlements).filter(s => s.gross > 0).sort((a, b) => b.gross - a.gross).map(s => (
                  <div key={s.vendor.id} style={{ padding: '12px', borderRadius: '10px', border: `2px solid ${s.vendor.color}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ width: '10px', height: '10px', borderRadius: '50%', background: s.vendor.color }} />
                        <span style={{ fontWeight: '600', fontSize: '13px' }}>{s.vendor.name}</span>
                        <span style={{ fontSize: '10px', color: '#888' }}>{s.vendor.commissionRate}%</span>
                      </div>
                      {s.vendor.type === 'consignment' && (
                        <button style={{ ...styles.button, ...styles.primaryBtn, padding: '4px 10px', fontSize: '10px' }}>Pay</button>
                      )}
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px', marginTop: '10px', fontSize: '11px' }}>
                      <div><div style={{ color: '#888' }}>Gross</div><div style={{ fontWeight: '600' }}>${s.gross.toFixed(2)}</div></div>
                      <div><div style={{ color: '#888' }}>Commission</div><div style={{ fontWeight: '600', color: '#dc2626' }}>-${s.commission.toFixed(2)}</div></div>
                      <div><div style={{ color: '#888' }}>Net</div><div style={{ fontWeight: '700', color: '#0f6e56' }}>${s.net.toFixed(2)}</div></div>
                      <div><div style={{ color: '#888' }}>Items</div><div style={{ fontWeight: '600' }}>{s.items.toFixed(1)}</div></div>
                    </div>
                  </div>
                ))}
              </div>

              <button style={{ ...styles.button, ...styles.secondaryBtn, width: '100%', marginTop: '16px' }} onClick={() => setShowSettlement(false)}>Close</button>
            </div>
          </div>
        );
      };

      // ============================================
      // MAIN RENDER
      // ============================================
      return (
        <div style={styles.app}>
          <header style={styles.header}>
            <div style={styles.logo}>
              <span style={{ fontSize: '22px' }}>🌱</span>
              <div>
                <div>Valley View Farm</div>
                <div style={{ fontSize: '9px', opacity: 0.8, fontWeight: '400' }}>{user.role.charAt(0).toUpperCase() + user.role.slice(1)}: {user.name}</div>
              </div>
            </div>
            <div style={styles.tabs}>
              {availableViews.map(tab => (
                <button
                  key={tab.id}
                  style={{ ...styles.tab, ...(view === tab.id ? styles.tabActive : styles.tabInactive) }}
                  onClick={() => setView(tab.id)}
                >
                  {tab.label}
                </button>
              ))}
            </div>
            <button style={{ ...styles.button, background: 'rgba(255,255,255,0.15)', color: 'white', fontSize: '11px' }} onClick={logout}>
              Logout
            </button>
          </header>

          {view === 'pos' && renderPOS()}
          {view === 'kiosk' && renderKiosk()}
          {view === 'vendors' && renderVendors()}
          {view === 'inventory' && renderInventory()}
          {view === 'admin' && renderAdmin()}

          {editingProduct !== null && <ProductEditModal product={editingProduct.id ? editingProduct : null} onClose={() => setEditingProduct(null)} />}
          {editingVendor !== null && <VendorEditModal vendor={editingVendor.id ? editingVendor : null} onClose={() => setEditingVendor(null)} />}
          {showPayment && <PaymentModal />}
          {showDevices && <DeviceConfigModal onClose={() => setShowDevices(false)} />}
          {showSettlement && <SettlementModal />}
        </div>
      );
    }

    // ============================================
    // APP ROOT
    // ============================================
    function App() {
      return (
        <AuthProvider>
          <AppContent />
        </AuthProvider>
      );
    }

    function AppContent() {
      const { user, loading } = useAuth();
      
      if (loading) {
        return <div className="loading">Loading...</div>;
      }
      
      return user ? <MainApp /> : <LoginScreen />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
