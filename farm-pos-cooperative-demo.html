    function FarmStorePOS() {

      // Simulated scale
      const simulateWeigh = useCallback(() => {
        setStable(false);
        const targetWeight = (Math.random() * 3 + 0.5).toFixed(2);
        let current = 0;
        const interval = setInterval(() => {
          current += parseFloat(targetWeight) / 10;
          if (current >= parseFloat(targetWeight)) {
            setWeight(parseFloat(targetWeight));
            setStable(true);
            clearInterval(interval);
          } else {
            setWeight(parseFloat(current.toFixed(2)));
          }
        }, 100);
      }, []);

      const findProductByBarcode = (barcode) => {
        for (const category of Object.keys(products)) {
          const product = products[category].find(p => p.barcode === barcode);
          if (product) return { product, category };
        }
        return null;
      };

      const addToCart = (product, quantity, weightValue = null) => {
        const isWeight = product.unitType === 'weight';
        const actualQuantity = weightValue || quantity;
        const lineTotal = isWeight ? product.price * actualQuantity : product.price * quantity;
        const vendor = vendors[product.vendorId];
        
        if (!isWeight) {
          const existingIndex = cart.findIndex(item => item.id === product.id);
          if (existingIndex >= 0) {
            const newCart = [...cart];
            newCart[existingIndex].quantity += quantity;
            newCart[existingIndex].total = newCart[existingIndex].quantity * product.price;
            setCart(newCart);
            return;
          }
        }
        
        setCart([...cart, {
          ...product,
          quantity: isWeight ? actualQuantity : quantity,
          total: lineTotal,
          isWeight,
          vendorName: vendor?.name || 'Unknown',
          vendorColor: vendor?.color || '#666',
          commissionRate: vendor?.commissionRate || 0,
        }]);
      };

      const addProduct = (newProduct) => {
        const category = newProduct.category;
        setProducts(prev => ({
          ...prev,
          [category]: [...prev[category], { ...newProduct, id: `${category[0]}${Date.now()}` }]
        }));
        setShowAddProduct(false);
      };

      const updateStock = (barcode, quantity, action = 'add') => {
        const result = findProductByBarcode(barcode);
        if (result) {
          setProducts(prev => ({
            ...prev,
            [result.category]: prev[result.category].map(p =>
              p.barcode === barcode
                ? { ...p, stock: action === 'add' ? p.stock + quantity : p.stock - quantity }
                : p
            )
          }));
          return true;
        }
        return false;
      };

      // Calculate settlement data
      const calculateSettlement = useMemo(() => {
        const settlement = {};
        
        // Initialize all vendors
        Object.values(vendors).forEach(v => {
          settlement[v.id] = {
            vendor: v,
            grossSales: 0,
            commission: 0,
            netPayable: 0,
            itemsSold: 0,
            transactions: [],
          };
        });

        // Process all sales
        sales.forEach(sale => {
          sale.items.forEach(item => {
            if (settlement[item.vendorId]) {
              const vendor = vendors[item.vendorId];
              const commission = item.total * (vendor.commissionRate / 100);
              settlement[item.vendorId].grossSales += item.total;
              settlement[item.vendorId].commission += commission;
              settlement[item.vendorId].netPayable += (item.total - commission);
              settlement[item.vendorId].itemsSold += item.quantity;
              settlement[item.vendorId].transactions.push({
                date: sale.date,
                item: item.name,
                quantity: item.quantity,
                total: item.total,
                commission,
              });
            }
          });
        });

        return settlement;
      }, [sales, vendors]);

      const cartTotal = cart.reduce((sum, item) => sum + item.total, 0);

      // Group cart by vendor for receipt
      const cartByVendor = useMemo(() => {
        const grouped = {};
        cart.forEach(item => {
          if (!grouped[item.vendorId]) {
            grouped[item.vendorId] = {
              vendor: vendors[item.vendorId],
              items: [],
              subtotal: 0,
            };
          }
          grouped[item.vendorId].items.push(item);
          grouped[item.vendorId].subtotal += item.total;
        });
        return grouped;
      }, [cart, vendors]);

                      {vendor?.name?.split(' ')[0] || 'Unknown'}
                    </div>
                    
                    <img src={product.image} alt={product.name} style={styles.productImage} />
                    <div style={{ fontSize: '12px', fontWeight: '600', marginBottom: '4px', lineHeight: '1.2' }}>
                      {product.name}
                    </div>
                    <div style={{ fontSize: '14px', fontWeight: '700', color: '#0f6e56' }}>
                      ${product.price.toFixed(2)}
                      <span style={{ fontSize: '10px', fontWeight: '400', color: '#666' }}>/{product.unit}</span>
                    </div>
                    <div style={{
                      fontSize: '10px',
                      color: product.stock < 10 ? '#dc2626' : '#666',
                      marginTop: '4px',
                    }}>
                      {product.unitType === 'weight' ? '⚖️ ' : ''}Stock: {product.stock}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sidebar */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            {/* Scale panel */}
            {scaleProduct && (
              <div style={{
                background: 'linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%)',
                border: '2px solid #d97706',
                borderRadius: '14px',
                padding: '16px',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px' }}>
                  <img src={scaleProduct.image} alt="" style={{ width: '50px', height: '50px', borderRadius: '8px', objectFit: 'cover' }} />
                  <div>
                    <div style={{ fontWeight: '600', color: '#92400e' }}>{scaleProduct.name}</div>
                    <div style={{ fontSize: '12px', color: '#b45309' }}>${scaleProduct.price.toFixed(2)}/lb</div>
                  </div>
                </div>
                <div style={{ fontSize: '36px', fontWeight: '700', textAlign: 'center', color: '#78350f', fontFamily: 'monospace' }}>
                  {weight.toFixed(2)} lb
                </div>
                <div style={{ textAlign: 'center', fontSize: '12px', color: '#92400e', marginBottom: '12px' }}>
                  {stable ? '✓ Stable' : '○ Measuring...'}
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1 }} onClick={simulateWeigh}>
                    Re-weigh
                  </button>
                  <button
                    style={{ ...styles.button, ...styles.primaryBtn, flex: 1 }}
                    onClick={() => {
                      if (stable && weight > 0) {
                        addToCart(scaleProduct, 1, weight);
                        setScaleProduct(null);
                        setWeight(0);
                      }
                    }}
                    disabled={!stable || weight === 0}
                  >
                    Add ${(scaleProduct.price * weight).toFixed(2)}
                  </button>
                </div>
              </div>
            )}

            {/* Cart */}
            <div style={{ ...styles.card, flex: 1 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                <span style={{ fontWeight: '600', fontSize: '15px' }}>🛒 Cart ({cart.length})</span>
                <button
                  style={{ ...styles.button, ...styles.secondaryBtn, padding: '4px 10px', fontSize: '11px' }}
                  onClick={() => setCart([])}
                >
                  Clear
                </button>
              </div>

              <div style={{ maxHeight: '250px', overflowY: 'auto', marginBottom: '12px' }}>
                {cart.length === 0 ? (
                  <div style={{ textAlign: 'center', color: '#888', padding: '24px', fontSize: '13px' }}>
                    No items in cart
                  </div>
                ) : (
                  cart.map((item, index) => (
                    <div key={index} style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      padding: '8px 0',
                      borderBottom: '1px solid #eee',
                    }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: '500', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                          <span style={{
                            width: '8px',
                            height: '8px',
                            borderRadius: '50%',
                            background: item.vendorColor,
                          }} />
                          {item.name}
                        </div>
                        <div style={{ fontSize: '11px', color: '#888' }}>
                          {item.isWeight
                            ? `${item.quantity.toFixed(2)} lb × $${item.price.toFixed(2)}`
                            : `${item.quantity} × $${item.price.toFixed(2)}`
                          }
                          <span style={{ marginLeft: '6px', color: '#aaa' }}>• {item.vendorName}</span>
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                        <span style={{ fontWeight: '600', color: '#0f6e56', fontSize: '13px' }}>${item.total.toFixed(2)}</span>
                        <button
                          style={{
                            width: '20px',
                            height: '20px',
                            borderRadius: '4px',
                            border: 'none',
                            background: '#fef2f2',
                            color: '#dc2626',
                            cursor: 'pointer',
                            fontSize: '10px',
                          }}
                          onClick={() => setCart(cart.filter((_, i) => i !== index))}
                        >
                          ✕
                        </button>
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* Vendor summary in cart */}
              {cart.length > 0 && (
                <div style={{ marginBottom: '12px', paddingBottom: '12px', borderBottom: '1px solid #eee' }}>
                  <div style={{ fontSize: '11px', color: '#888', marginBottom: '6px' }}>By vendor:</div>
                  <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                    {Object.entries(cartByVendor).map(([vendorId, data]) => (
                      <span key={vendorId} style={{
                        padding: '3px 8px',
                        borderRadius: '10px',
                        fontSize: '10px',
                        fontWeight: '600',
                        background: data.vendor?.color + '20',
                        color: data.vendor?.color,
                      }}>
                        {data.vendor?.name?.split(' ')[0]}: ${data.subtotal.toFixed(2)}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              <div style={{
                display: 'flex',
                justifyContent: 'space-between',
                padding: '12px 0',
                borderTop: '2px solid #0f6e56',
                fontSize: '18px',
                fontWeight: '700',
              }}>
                <span>Total</span>
                <span style={{ color: '#0f6e56' }}>${cartTotal.toFixed(2)}</span>
              </div>

              <button
                style={{
                  ...styles.button,
                  ...styles.primaryBtn,
                  width: '100%',
                  padding: '14px',
                  fontSize: '15px',
                  opacity: cart.length === 0 ? 0.5 : 1,
                }}
                disabled={cart.length === 0}
                onClick={() => setShowPayment(true)}
              >
                💳 Pay Now
              </button>
            </div>
          </div>
        </div>
      );

      // ============================================
      // CUSTOMER VIEW (UNCHANGED UI)
      // ============================================
      const renderCustomerView = () => {
        const labels = {
          en: { welcome: 'Welcome to Valley View Farm Cooperative', scan: 'Tap items to add • Supporting local farms', basket: 'Your Basket', pay: 'Pay Now', clear: 'Clear' },
          es: { welcome: 'Bienvenido a la Cooperativa Valley View', scan: 'Toque los artículos • Apoyando granjas locales', basket: 'Tu Canasta', pay: 'Pagar', clear: 'Borrar' }
        };
        const t = labels[language];

        return (
          <div style={{ ...styles.app, paddingBottom: '160px' }}>
            <button
              style={{
                position: 'fixed',
                top: '16px',
                right: '16px',
                background: 'white',
                padding: '10px 14px',
                borderRadius: '20px',
                border: '1px solid #ddd',
                fontSize: '13px',
                cursor: 'pointer',
                zIndex: 100,
                boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
                fontFamily: 'inherit',
              }}
              onClick={() => setLanguage(language === 'en' ? 'es' : 'en')}
            >
              {language === 'en' ? '🇺🇸 EN' : '🇲🇽 ES'}
            </button>

            <div style={{ maxWidth: '700px', margin: '0 auto', padding: '20px' }}>
              <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                <div style={{ fontSize: '26px', fontWeight: '700', color: '#0f6e56', marginBottom: '8px' }}>
                  🌱 {t.welcome}
                </div>
                <div style={{ color: '#666', fontSize: '14px' }}>{t.scan}</div>
              </div>

              <div style={{ ...styles.categories, justifyContent: 'center' }}>
                {CATEGORIES.map(cat => (
                  <button
                    key={cat.id}
                    style={{
                      ...styles.categoryBtn,
                      borderColor: cat.color,
                      background: selectedCategory === cat.id ? cat.color : 'white',
                      color: selectedCategory === cat.id ? 'white' : cat.color,
                    }}
                    onClick={() => setSelectedCategory(cat.id)}
                  >
                    <span style={{ fontSize: '16px' }}>{cat.icon}</span> {cat.name}
                  </button>
                ))}
              </div>

              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))',
                gap: '14px',
              }}>
                {products[selectedCategory]?.map(product => {
                  const vendor = vendors[product.vendorId];
                  return (
                    <div
                      key={product.id}
                      style={{
                        background: 'white',
                        borderRadius: '16px',
                        padding: '14px',
                        textAlign: 'center',
                        boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
                        cursor: 'pointer',
                        position: 'relative',
                      }}
                      onClick={() => {
                        if (product.unitType === 'weight') {
                          setScaleProduct(product);
                          simulateWeigh();
                        } else {
                          addToCart(product, 1);
                        }
                      }}
                    >
                      <img
                        src={product.image}
                        alt={product.name}
                        style={{ width: '100%', height: '100px', objectFit: 'cover', borderRadius: '10px', marginBottom: '10px' }}
                      />
                      <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '4px' }}>{product.name}</div>
                      <div style={{ fontSize: '16px', fontWeight: '700', color: '#0f6e56' }}>
                        ${product.price.toFixed(2)}
                        <span style={{ fontSize: '11px', fontWeight: '400', color: '#666' }}>/{product.unit}</span>
                      </div>
                      {/* Small vendor indicator */}
                      <div style={{ fontSize: '10px', color: vendor?.color, marginTop: '4px' }}>
                        {vendor?.name}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Fixed bottom cart */}
            <div style={{
              position: 'fixed',
              bottom: 0,
              left: 0,
              right: 0,
              background: 'white',
              padding: '16px 20px',
              boxShadow: '0 -4px 20px rgba(0,0,0,0.12)',
              borderRadius: '24px 24px 0 0',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '12px' }}>
                <div>
                  <div style={{ fontSize: '13px', color: '#666' }}>{t.basket} ({cart.length} items)</div>
                  <div style={{ fontSize: '24px', fontWeight: '700', color: '#0f6e56' }}>${cartTotal.toFixed(2)}</div>
                </div>
                <div style={{ display: 'flex', gap: '10px' }}>
                  <button
                    style={{ ...styles.button, ...styles.secondaryBtn }}
                    onClick={() => setCart([])}
                  >
                    {t.clear}
                  </button>
                  <button
                    style={{ ...styles.button, ...styles.primaryBtn, padding: '12px 24px' }}
                    disabled={cart.length === 0}
                    onClick={() => setShowPayment(true)}
                  >
                    {t.pay} →
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // VENDORS VIEW
      // ============================================
      const renderVendorsView = () => (
        <div style={{ padding: '20px', maxWidth: '1200px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
            <h2 style={{ margin: 0, fontSize: '20px' }}>🏪 Vendors & Consignment</h2>
            <div style={{ display: 'flex', gap: '10px' }}>
              <button
                style={{ ...styles.button, ...styles.primaryBtn }}
                onClick={() => setShowSettlement(true)}
              >
                💰 Settlement Report
              </button>
            </div>
          </div>

          {/* Vendor Cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '16px' }}>
            {Object.values(vendors).map(vendor => {
              const vendorProducts = Object.values(products).flat().filter(p => p.vendorId === vendor.id);
              const settlement = calculateSettlement[vendor.id];
              
              return (
                <div
                  key={vendor.id}
                  style={{
                    ...styles.card,
                    borderTop: `4px solid ${vendor.color}`,
                  }}
                >
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
                    <div>
                      <div style={{ fontWeight: '600', fontSize: '16px', marginBottom: '4px' }}>{vendor.name}</div>
                      <span style={{
                        padding: '3px 10px',
                        borderRadius: '12px',
                        fontSize: '11px',
                        fontWeight: '600',
                        background: vendor.type === 'owner' ? '#dcfce7' : '#fef3c7',
                        color: vendor.type === 'owner' ? '#166534' : '#92400e',
                      }}>
                        {vendor.type === 'owner' ? '🏠 Farm Store' : '📦 Consignment'}
                      </span>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: '28px', fontWeight: '700', color: vendor.color }}>
                        {vendor.commissionRate}%
                      </div>
                      <div style={{ fontSize: '10px', color: '#888' }}>Commission</div>
                    </div>
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                    <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                      <div style={{ fontSize: '18px', fontWeight: '700', color: '#0f6e56' }}>{vendorProducts.length}</div>
                      <div style={{ fontSize: '11px', color: '#666' }}>Products</div>
                    </div>
                    <div style={{ background: '#f8f7f4', padding: '12px', borderRadius: '8px' }}>
                      <div style={{ fontSize: '18px', fontWeight: '700', color: '#185FA5' }}>
                        ${settlement?.grossSales.toFixed(2) || '0.00'}
                      </div>
                      <div style={{ fontSize: '11px', color: '#666' }}>Period Sales</div>
                    </div>
                  </div>

                  {vendor.type === 'consignment' && (
                    <div style={{ borderTop: '1px solid #eee', paddingTop: '12px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '8px' }}>
                        <span style={{ color: '#666' }}>Net Payable:</span>
                        <span style={{ fontWeight: '600', color: '#0f6e56' }}>${settlement?.netPayable.toFixed(2) || '0.00'}</span>
                      </div>
                      <div style={{ fontSize: '11px', color: '#888' }}>
                        Payment: {vendor.paymentMethod.toUpperCase()} • {vendor.paymentTerms}
                      </div>
                    </div>
                  )}

                  <div style={{ marginTop: '12px', display: 'flex', gap: '8px' }}>
                    <button style={{ ...styles.button, ...styles.secondaryBtn, flex: 1, fontSize: '11px' }}>
                      View Products
                    </button>
                    {vendor.type === 'consignment' && (
                      <button style={{ ...styles.button, ...styles.primaryBtn, flex: 1, fontSize: '11px' }}>
                        Process Payment
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Quick Stats */}
          <div style={{ ...styles.card, marginTop: '20px' }}>
            <h3 style={{ margin: '0 0 16px', fontSize: '16px' }}>📊 Cooperative Summary</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px' }}>
              <div style={{ background: '#f0fdf4', padding: '16px', borderRadius: '10px', textAlign: 'center' }}>
                <div style={{ fontSize: '28px', fontWeight: '700', color: '#0f6e56' }}>
                  {Object.values(vendors).length}
                </div>
                <div style={{ fontSize: '12px', color: '#666' }}>Total Vendors</div>
              </div>
              <div style={{ background: '#fef3c7', padding: '16px', borderRadius: '10px', textAlign: 'center' }}>
                <div style={{ fontSize: '28px', fontWeight: '700', color: '#92400e' }}>
                  {Object.values(vendors).filter(v => v.type === 'consignment').length}
                </div>
                <div style={{ fontSize: '12px', color: '#666' }}>Consignment Partners</div>
              </div>
              <div style={{ background: '#eff6ff', padding: '16px', borderRadius: '10px', textAlign: 'center' }}>
                <div style={{ fontSize: '28px', fontWeight: '700', color: '#1e40af' }}>
                  {Object.values(products).flat().length}
                </div>
                <div style={{ fontSize: '12px', color: '#666' }}>Total Products</div>
              </div>
              <div style={{ background: '#fdf2f8', padding: '16px', borderRadius: '10px', textAlign: 'center' }}>
                <div style={{ fontSize: '28px', fontWeight: '700', color: '#9d174d' }}>
                  ${Object.values(calculateSettlement).filter(v => v.vendor.type === 'consignment').reduce((sum, v) => sum + v.netPayable, 0).toFixed(2)}
                </div>
                <div style={{ fontSize: '12px', color: '#666' }}>Due to Vendors</div>
              </div>
            </div>
          </div>
        </div>
      );

      // ============================================
      // INVENTORY VIEW
      // ============================================
      const renderInventoryView = () => {
        const allProducts = Object.entries(products).flatMap(([category, prods]) =>
          prods.map(p => ({ ...p, category }))
        );

        return (
          <div style={{ padding: '20px', maxWidth: '1400px', margin: '0 auto' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
              <h2 style={{ margin: 0, fontSize: '20px' }}>📦 Inventory</h2>
              <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                <select
                  style={{ ...styles.input, width: '160px' }}
                  value={vendorFilter}
                  onChange={e => setVendorFilter(e.target.value)}
                >
                  <option value="all">All Vendors</option>
                  {Object.values(vendors).map(v => (
                    <option key={v.id} value={v.id}>{v.name}</option>
                  ))}
                </select>
                <button
                  style={{ ...styles.button, ...styles.primaryBtn }}
                  onClick={() => setShowAddProduct(true)}
                >
                  ➕ Add Product
                </button>
              </div>
            </div>

            <div style={{ ...styles.card, overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: '800px' }}>
                <thead>
                  <tr style={{ background: '#0f6e56', color: 'white' }}>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Product</th>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Vendor</th>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Category</th>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Price</th>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Stock</th>
                    <th style={{ padding: '12px', textAlign: 'left', fontSize: '11px' }}>Commission</th>
                  </tr>
                </thead>
                <tbody>
                  {allProducts
                    .filter(p => vendorFilter === 'all' || p.vendorId === vendorFilter)
                    .map(product => {
                    const vendor = vendors[product.vendorId];
                    return (
                      <tr key={product.id} style={{ borderBottom: '1px solid #eee' }}>
                        <td style={{ padding: '10px' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <img src={product.image} alt="" style={{ width: '36px', height: '36px', borderRadius: '6px', objectFit: 'cover' }} />
                            <span style={{ fontWeight: '500', fontSize: '13px' }}>{product.name}</span>
                          </div>
                        </td>
                        <td style={{ padding: '10px' }}>
                          <span style={{
                            display: 'inline-flex',
                            alignItems: 'center',
                            gap: '6px',
                            padding: '4px 10px',
                            borderRadius: '12px',
                            fontSize: '11px',
                            fontWeight: '600',
                            background: vendor?.color + '20',
                            color: vendor?.color,
                          }}>
                            <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: vendor?.color }} />
                            {vendor?.name}
                          </span>
                        </td>
                        <td style={{ padding: '10px', fontSize: '12px' }}>{product.category}</td>
                        <td style={{ padding: '10px', fontWeight: '600', fontSize: '13px' }}>${product.price.toFixed(2)}/{product.unit}</td>
                        <td style={{ padding: '10px', fontWeight: '600', color: product.stock < 15 ? '#dc2626' : '#0f6e56' }}>
                          {product.stock}
                        </td>
                        <td style={{ padding: '10px', fontSize: '12px' }}>
                          {vendor?.commissionRate}%
                          <span style={{ color: '#888', marginLeft: '6px' }}>
                            (${(product.price * vendor?.commissionRate / 100).toFixed(2)}/unit)
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // ============================================
      // MAIN RENDER
      // ============================================
      return (
        <div style={styles.app}>
          <header style={styles.header}>
            <div style={styles.logo}>
              <span style={{ fontSize: '24px' }}>🌱</span>
              <div>
                <div>Valley View Farm</div>
                <div style={{ fontSize: '10px', opacity: 0.8, fontWeight: '400' }}>Cooperative POS</div>
              </div>
            </div>
            <div style={styles.tabs}>
              {[
                { id: 'operator', label: '👤 POS' },
                { id: 'customer', label: '🖥️ Kiosk' },
                { id: 'vendors', label: '🤝 Vendors' },
                { id: 'inventory', label: '📦 Inventory' },
              ].map(tab => (
                <button
                  key={tab.id}
                  style={{ ...styles.tab, ...(view === tab.id ? styles.tabActive : styles.tabInactive) }}
                  onClick={() => setView(tab.id)}
                >
                  {tab.label}
                </button>
              ))}
            </div>
            <div style={{ fontSize: '11px', opacity: 0.8 }}>
              {new Date().toLocaleDateString()}
            </div>
          </header>

          {view === 'operator' && renderOperatorView()}
          {view === 'customer' && renderCustomerView()}
          {view === 'vendors' && renderVendorsView()}
          {view === 'inventory' && renderInventoryView()}

          {showAddProduct && <AddProductModal />}
          {showPayment && <PaymentModal />}
          {showVendorSettings && <VendorSettingsModal />}
          {showSettlement && <SettlementModal />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FarmStorePOS />);
  </script>
</body>
</html>
